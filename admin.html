<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - SIWO STORE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script>emailjs.init("vj_Kj-N52AowtKruT");</script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Poppins',sans-serif;background:#0f172a;color:white;padding:20px;}
    #toast{visibility:hidden;min-width:250px;background:#10b981;color:#fff;text-align:center;border-radius:12px;padding:16px;position:fixed;left:50%;bottom:30px;transform:translateX(-50%);z-index:10000;}
    #toast.show{visibility:visible;animation:fadein 0.5s,fadeout 0.5s 2.5s;}
    @keyframes fadein{from{bottom:0;opacity:0;}to{bottom:30px;opacity:1;}}
    @keyframes fadeout{from{bottom:30px;opacity:1;}to{bottom:0;opacity:0;}}
    #loginOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#0f172a;display:none;align-items:center;justify-content:center;z-index:9999;}
    .login-box{background:#1e293b;padding:30px;border-radius:20px;width:85%;max-width:350px;text-align:center;}
    .box{background:#1e293b;padding:25px;border-radius:15px;max-width:700px;margin:20px auto;border:1px solid #334155;}
    h1{text-align:center;color:#00d2ff;font-size:20px;margin-bottom:20px;}
    .dashboard-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:600px;margin:0 auto 20px;}
    .stat-card{background:#1e293b;padding:15px;border-radius:15px;text-align:center;}
    .order-item{background:#0f172a;border-left:4px solid #f59e0b;border-radius:16px;padding:14px;margin-bottom:12px;}
    .order-item.status-selesai{border-left-color:#10b981;padding:8px 14px;}
    .order-selesai-ringkas{display:flex;justify-content:space-between;font-size:13px;}
    .order-detail-lengkap textarea{width:100%;margin-top:8px;margin-bottom:8px;}
    .aksi-group{display:flex;gap:10px;}
    .btn-success{background:#10b981;color:white;}
    .btn-danger{background:#ef4444;color:white;}
    .btn-warning{background:#f59e0b;color:#0f172a;}
    button{padding:10px;border:none;border-radius:30px;font-weight:800;cursor:pointer;}
    img.bukti-img{max-width:100px;max-height:100px;border-radius:8px;margin-top:8px;}
  </style>
</head>
<body>
<div id="toast"></div>
<div id="loginOverlay"><div class="login-box"><h1>ADMIN SIWOSTORE</h1><input type="password" id="passAdmin" placeholder="Password"><button onclick="cekAksesAdmin()">MASUK</button></div></div>
<div class="dashboard-grid"><div class="stat-card"><span>Total Produk</span><h2 id="statTotal">0</h2></div><div class="stat-card"><span>Total Cuan</span><h2 id="statCuan">Rp0</h2></div></div>
<div class="box"><h1>📥 Pesanan Masuk</h1><div id="listPesananAdmin">Memuat...</div></div>
<div class="box"><h1>🛠️ Atur Produk</h1><label>Nama Akun</label><input id="nama"><div class="flex-row"><div><label>Harga</label><input id="displayHarga" oninput="formatRupiah(this,'harga')"><input type="hidden" id="harga"></div><div><label>Kategori</label><select id="kategori"><option>Mobile Legends</option><option>Free Fire</option><option>PUBG Mobile</option></select></div></div><label>Spesifikasi</label><textarea id="deskripsi"></textarea><label>Link Foto</label><input id="gambar"><input type="hidden" id="editId"><button class="btn-success" onclick="submitProduk()">SIMPAN</button><button onclick="resetForm()">RESET</button></div>
<div class="box"><h1>🎟️ Voucher</h1><input id="vKode" placeholder="Kode"><div><input id="vDiskon" placeholder="Potongan"><input id="vKuota" placeholder="Kuota"></div><button class="btn-success" onclick="tambahVoucher()">SIMPAN VOUCHER</button><div id="listVoucherAdmin"></div></div>
<div class="box"><h1>📢 Pengumuman</h1><textarea id="inputPengumuman"></textarea><button onclick="updatePengumuman()">UPDATE</button></div>
<div class="box"><h1>📸 Testimoni</h1><input id="inputTesti"><button onclick="tambahTesti()">TAMBAH</button><button onclick="location.href='index.html'">LIHAT TOKO</button></div>
<div class="produk-container"><h2>Daftar Akun</h2><div id="produk"></div><h2>Testimoni Admin</h2><div id="list-testimoni-admin"></div></div>
<script>
const PASSWORD_RAHASIA="16092007";
function cekAksesAdmin(){ let p=document.getElementById("passAdmin").value; if(p===PASSWORD_RAHASIA){ sessionStorage.setItem("loginOk","true"); location.reload(); } else alert("Salah!"); }
if(sessionStorage.getItem("loginOk")!=="true") document.getElementById("loginOverlay").style.display="flex";
function formatRupiah(el,hid){ let v=el.value.replace(/[^0-9]/g,""); document.getElementById(hid).value=v; if(v) el.value=new Intl.NumberFormat('id-ID').format(v); else el.value=""; }
function resetForm(){ document.getElementById("nama").value=""; document.getElementById("harga").value=""; document.getElementById("displayHarga").value=""; document.getElementById("gambar").value=""; document.getElementById("deskripsi").value=""; document.getElementById("editId").value=""; }
window.showToast=function(msg,col){ let t=document.getElementById("toast"); t.innerText=msg; t.style.backgroundColor=col||"#10b981"; t.className="show"; setTimeout(()=>t.className="",3000); };
</script>
<script type="module" src="app.js?v=4.0"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - Faza Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; padding: 20px; margin: 0; }
    .box { background: #1e293b; padding: 25px; border-radius: 15px; max-width: 500px; margin: 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid #334155; }
    h1 { text-align: center; margin-bottom: 20px; font-size: 20px; color: #00d2ff; text-transform: uppercase; letter-spacing: 1px; }
    
    label { font-size: 11px; color: #94a3b8; margin-top: 12px; display: block; font-weight: 600; text-transform: uppercase; }
    input, textarea, select { 
      width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; 
      border: 1px solid #334155; box-sizing: border-box; background: #0f172a; color: white;
      font-family: 'Poppins', sans-serif; outline: none;
    }
    input:focus { border-color: #00d2ff; }
    
    .flex-row { display: flex; gap: 10px; }
    .flex-row > div { flex: 1; }

    /* STYLING FLASH SALE TOGGLE */
    .promo-box {
      background: rgba(239, 68, 68, 0.1);
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
      border: 1px solid #ef4444;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .promo-box input[type="checkbox"] { width: 22px; height: 22px; margin: 0; cursor: pointer; accent-color: #ef4444; }
    .promo-box label { margin: 0; color: #ef4444; font-weight: 800; cursor: pointer; font-size: 13px; }

    textarea { height: 80px; resize: vertical; }

    button { width: 100%; padding: 14px; margin-top: 15px; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; font-weight: 800; transition: 0.3s; text-transform: uppercase; }
    .btn-tambah { background: linear-gradient(90deg, #3a7bd5, #00d2ff); color: white; }
    .btn-tambah:active { transform: scale(0.95); }
    
    .btn-lihat { background: #475569; color: white; margin-top: 10px; }
    .btn-warning { background: #f1c40f; color: #0f172a; }
    .btn-success { background: #10b981; color: white; }
    
    .produk-container { max-width: 600px; margin: 40px auto; }
    h2 { border-left: 4px solid #00d2ff; padding-left: 10px; font-size: 18px; color: white; margin-bottom: 20px; }
    
    #produk { margin-top: 20px; }
    /* Card list produk di admin */
    .card-admin { background: #1e293b; padding: 12px; border-radius: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; border: 1px solid #334155; }
    .card-admin img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; }
  </style>
</head>

<body>

<div class="box">
  <h1>🛠️ Atur Produk Akun</h1>

  <label>Nama Akun</label>
  <input type="text" id="nama" placeholder="Contoh: Akun ML Mythic Glory">
  
  <div class="flex-row">
    <div>
      <label>Harga Jual (Titik Otomatis)</label>
      <input type="text" id="displayHarga" placeholder="Rp 0" oninput="formatRupiah(this, 'harga')">
      <input type="hidden" id="harga"> </div>
    <div>
      <label>Harga Coret (Diskon)</label>
      <input type="text" id="displayHargaLama" placeholder="Rp 0" oninput="formatRupiah(this, 'hargaLama')">
      <input type="hidden" id="hargaLama">
    </div>
  </div>
  
  <div class="flex-row">
    <div>
      <label>Kategori Game</label>
      <select id="kategori">
        <option value="Mobile Legends">Mobile Legends</option>
        <option value="Free Fire">Free Fire</option>
        <option value="PUBG Mobile">PUBG Mobile</option>
        <option value="Lainnya">Lainnya</option>
      </select>
    </div>
    <div>
      <label>Status Stock</label>
      <select id="status">
        <option value="Ready">READY STOK</option>
        <option value="Sold">TERJUAL (SOLD)</option>
      </select>
    </div>
  </div>

  <div class="promo-box">
    <input type="checkbox" id="isPromo">
    <label for="isPromo">⚡ AKTIFKAN MODE FLASH SALE</label>
  </div>
  
  <label>Spesifikasi Singkat</label>
  <textarea id="deskripsi" placeholder="Contoh: Skin 200+, Login Moonton, No Minus"></textarea>
  
  <label>Link Foto Akun</label>
  <input type="text" id="gambar" placeholder="Tempel link foto di sini">
  
  <input type="hidden" id="editId">
  
  <button class="btn-tambah" onclick="submitProduk()">💾 SIMPAN DATA PRODUK</button>
</div>

<div class="box">
  <h1>🧾 Update Status Pesanan</h1>
  <label>ID Pesanan</label>
  <input type="text" id="adminIdPesanan" placeholder="Masukkan ID Invoice (FZ-XXXX)">
  <label>Pilih Status Terbaru</label>
  <select id="adminStatusUpdate">
    <option value="⏳ Menunggu Pembayaran">⏳ Menunggu Pembayaran</option>
    <option value="✅ Pembayaran Diterima (Proses)">✅ Pembayaran Diterima (Proses)</option>
    <option value="🚚 Data Akun Sedang Dikirim">🚚 Data Akun Sedang Dikirim</option>
    <option value="🎉 Pesanan Selesai">🎉 Pesanan Selesai</option>
    <option value="❌ Pesanan Dibatalkan">❌ Pesanan Dibatalkan</option>
  </select>
  <button class="btn-success" onclick="updateStatusPesanan()">💾 UPDATE STATUS</button>
</div>

<div class="box">
  <h1>📢 Pengumuman Toko</h1>
  <textarea id="teksBaru" placeholder="Tulis info toko di sini..."></textarea>
  <button class="btn-warning" onclick="updatePengumuman()">📢 UPDATE RUNNING TEXT</button>
</div>

<div class="box">
  <h1>📸 Tambah Testimoni</h1>
  <label>Link Foto Bukti</label>
  <input type="text" id="fotoTesti" placeholder="Link gambar testi">
  <label>Keterangan</label>
  <input type="text" id="ketTesti" placeholder="Contoh: Akun aman, fast respon!">
  
  <button class="btn-tambah" onclick="submitTestimoni()" style="background: #10b981;">+ SIMPAN TESTIMONI</button>
  <button class="btn-lihat" onclick="window.location.href='index.html'">👀 LIHAT TAMPILAN TOKO</button>
</div>

<div class="produk-container">
  <h2>Daftar Akun Aktif</h2>
  <div id="produk"></div>

  <h2 style="margin-top: 40px;">Daftar Testimoni</h2>
  <div id="list-testimoni"></div>
</div>

<script>
// Fungsi sakti buat kasih titik otomatis pas ngetik harga
function formatRupiah(el, hiddenId) {
    let value = el.value.replace(/[^0-9]/g, ""); 
    document.getElementById(hiddenId).value = value;
    if (value === "") {
        el.value = "";
        return;
    }
    el.value = new Intl.NumberFormat('id-ID').format(value);
}
</script>

<script type="module" src="app.js?v=999"></script>

</body>
</html>

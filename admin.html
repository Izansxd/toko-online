<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - SIWO STORE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script type="text/javascript">
     (function(){
        emailjs.init("vj_Kj-N52AowtKruT"); 
     })();
  </script>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; padding: 20px; margin: 0; }
    
    /* --- CSS LOGIN OVERLAY --- */
    #loginOverlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #0f172a;
      display: none; /* Default sembunyi, diatur lewat JS */
      flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
    }
    .login-box {
      background: #1e293b; padding: 30px; border-radius: 20px;
      border: 1px solid #334155; text-align: center; width: 85%; max-width: 350px;
    }
    .login-box input {
      padding: 12px; border-radius: 8px; border: 1px solid #334155;
      background: #0f172a; color: white; text-align: center;
      margin-bottom: 15px; width: 100%; outline: none; box-sizing: border-box;
    }
    .login-box button {
      padding: 12px; width: 100%; border-radius: 8px; border: none;
      background: linear-gradient(90deg, #3a7bd5, #00d2ff); color: white; 
      cursor: pointer; font-weight: bold; text-transform: uppercase;
    }
    /* --- END CSS LOGIN --- */

    .box { background: #1e293b; padding: 25px; border-radius: 15px; max-width: 500px; margin: 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid #334155; }
    h1 { text-align: center; margin-bottom: 20px; font-size: 20px; color: #00d2ff; text-transform: uppercase; letter-spacing: 1px; }
    
    .dashboard-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 600px; margin: 0 auto 20px; }
    .stat-card { background: #1e293b; padding: 15px; border-radius: 15px; border: 1px solid #334155; text-align: center; }
    .stat-card span { font-size: 9px; color: #94a3b8; font-weight: 600; text-transform: uppercase; }
    .stat-card h2 { margin: 5px 0 0; font-size: 18px; }
    .stat-total h2 { color: #00d2ff; }
    .stat-cuan h2 { color: #f1c40f; }

    label { font-size: 11px; color: #94a3b8; margin-top: 12px; display: block; font-weight: 600; text-transform: uppercase; }
    input, textarea, select { 
      width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; 
      border: 1px solid #334155; box-sizing: border-box; background: #0f172a; color: white;
      font-family: 'Poppins', sans-serif; outline: none;
    }
    
    .flex-row { display: flex; gap: 10px; }
    .flex-row > div { flex: 1; }

    button { width: 100%; padding: 14px; margin-top: 10px; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; font-weight: 800; transition: 0.3s; text-transform: uppercase; }
    .btn-tambah { background: linear-gradient(90deg, #3a7bd5, #00d2ff); color: white; }
    .btn-success { background: #10b981; color: white; }
    .btn-warning { background: #f1c40f; color: #0f172a; }
    .btn-danger { background: #ef4444; color: white !important; }
    
    .produk-container { max-width: 600px; margin: 40px auto; padding: 0 15px; }
    .card-admin { 
      background: #1e293b; padding: 12px; border-radius: 12px; margin-bottom: 12px; 
      display: flex; align-items: center; justify-content: space-between; gap: 12px; 
      border: 1px solid #334155; 
    }
    .card-admin-info { display: flex; align-items: center; gap: 12px; flex: 1; }
    .card-admin img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; background: #0f172a; }
    .admin-actions { display: flex; gap: 8px; }
    .card-admin button { width: auto; padding: 8px 12px; margin: 0; font-size: 11px; }

    .order-item-admin {
      background: white; color: #333; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid #10b981;
      transition: 0.3s;
    }
    .order-item-admin p { margin: 3px 0; font-size: 12px; }
    .wa-tag { background: #25d366; color: white; padding: 2px 6px; border-radius: 4px; text-decoration: none; font-weight: bold; }

    .order-item-admin.status-selesai {
      background: #0f172a !important; 
      border-left: 5px solid #64748b !important; 
      opacity: 0.7;
    }
    .order-item-admin.status-selesai p { color: #94a3b8 !important; }
    .order-item-admin.status-selesai .wa-tag { background: #475569; }

    .btn-selesai-muted {
      background: #334155 !important;
      color: #64748b !important;
      cursor: not-allowed !important;
      pointer-events: none;
    }

    #listVoucherAdmin div {
      display: flex; justify-content: space-between; align-items: center;
      background: #0f172a; padding: 10px; border-radius: 8px; margin-top: 8px; border: 1px solid #334155;
    }
  </style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box">
    <h1 style="font-size: 16px;">ADMIN SIWOSTORE</h1>
    <input type="password" id="passAdmin" placeholder="Masukkan Password">
    <button onclick="window.cekAksesAdmin()">MASUK SEKARANG</button>
    <p id="pesanSalah" style="color: #ef4444; font-size: 11px; margin-top: 10px; display: none;">Password salah, Faz!</p>
  </div>
</div>

<div class="dashboard-grid">
  <div class="stat-card stat-total"><span>Total Produk</span><h2 id="statTotal">0</h2></div>
  <div class="stat-card stat-cuan"><span>Total Cuan</span><h2 id="statCuan">Rp0</h2></div>
</div>

<div class="box" style="max-width: 600px; border: 1px solid #10b981;">
  <h1>📥 Pesanan Masuk</h1>
  <div id="listPesananAdmin">
    <p style="text-align: center; font-size: 12px; color: #64748b;">Memuat data pesanan...</p>
  </div>
</div>

<div class="box">
  <h1>🛠️ Atur Produk Akun</h1>
  <label>Nama Akun</label>
  <input type="text" id="nama" placeholder="Contoh: Akun ML Mythic Glory">
  
  <div class="flex-row">
    <div>
      <label>Harga Jual</label>
      <input type="text" id="displayHarga" placeholder="Rp 0" oninput="formatRupiah(this, 'harga')">
      <input type="hidden" id="harga"> 
    </div>
    <div>
      <label>Kategori Game</label>
      <select id="kategori">
        <option value="Mobile Legends">Mobile Legends</option>
        <option value="Free Fire">Free Fire</option>
        <option value="PUBG Mobile">PUBG Mobile</option>
        <option value="Lainnya">Lainnya</option>
      </select>
    </div>
  </div>
  
  <label>Spesifikasi Lengkap</label>
  <textarea id="deskripsi" placeholder="- Skin Legend: Gusion..."></textarea>
  
  <label>Link Foto Akun (Gunakan koma [,] jika > 1)</label>
  <input type="text" id="gambar" placeholder="link1.jpg, link2.jpg">
  
  <input type="hidden" id="editId">
  <button class="btn-tambah" onclick="window.submitProduk()">💾 SIMPAN DATA PRODUK</button>
  <button style="background: #475569; color: white;" onclick="resetForm()">➕ RESET FORM</button>
</div>

<div class="box">
  <h1>🎟️ Kelola Voucher</h1>
  <label>Kode Voucher</label>
  <input type="text" id="vKode" placeholder="Contoh: PROMO10K">
  <div class="flex-row">
    <div><label>Potongan (Rp)</label><input type="number" id="vDiskon"></div>
    <div><label>Kuota</label><input type="number" id="vKuota"></div>
  </div>
  <button class="btn-success" onclick="window.tambahVoucher()">💾 SIMPAN VOUCHER</button>
  <div id="listVoucherAdmin" style="margin-top:15px;"></div>
</div>

<div class="box">
  <h1>📢 Pengumuman Toko</h1>
  <textarea id="inputPengumuman" placeholder="Tulis info promo/toko..."></textarea>
  <button class="btn-warning" onclick="window.updatePengumuman()">📢 UPDATE RUNNING TEXT</button>
</div>

<div class="box">
  <h1>📸 Tambah Testimoni</h1>
  <input type="text" id="inputTesti" placeholder="Link gambar testi">
  <button class="btn-success" onclick="window.tambahTesti()">+ SIMPAN TESTIMONI</button>
  <button style="background: #3b82f6; color:white;" onclick="window.location.href='index.html'">👀 LIHAT TAMPILAN TOKO</button>
</div>

<div class="produk-container">
  <h2 style="border-bottom: 1px solid #334155; padding-bottom: 10px; font-size: 16px;">Daftar Akun Aktif</h2>
  <div id="produk"></div>
  
  <h2 style="margin-top: 40px; border-bottom: 1px solid #334155; padding-bottom: 10px; font-size: 16px;">Daftar Testimoni</h2>
  <div id="list-testimoni-admin" style="display: grid; grid-template-columns: 1fr; gap: 10px;"></div>
</div>

<script>
// --- LOGIKA PASSWORD ADMIN (MANDIRI) ---
const PASSWORD_RAHASIA = "faza123"; 

window.cekAksesAdmin = function() {
    const pass = document.getElementById("passAdmin").value;
    const overlay = document.getElementById("loginOverlay");
    const pesan = document.getElementById("pesanSalah");

    if (pass === PASSWORD_RAHASIA) {
        sessionStorage.setItem("loginOk", "true");
        overlay.style.display = "none";
        // Refresh biar app.js jalan mulus narik data
        location.reload(); 
    } else {
        pesan.style.display = "block";
        document.getElementById("passAdmin").value = "";
    }
};

// Cek status saat halaman dimuat
window.addEventListener("DOMContentLoaded", () => {
    const isLogin = sessionStorage.getItem("loginOk");
    const overlay = document.getElementById("loginOverlay");
    
    if (isLogin === "true") {
        overlay.style.display = "none";
    } else {
        overlay.style.display = "flex";
    }
});

function formatRupiah(el, hiddenId) {
    let value = el.value.replace(/[^0-9]/g, ""); 
    document.getElementById(hiddenId).value = value;
    if (value === "") { el.value = ""; return; }
    el.value = new Intl.NumberFormat('id-ID').format(value);
}

function resetForm() {
    document.getElementById("nama").value = "";
    document.getElementById("harga").value = "";
    document.getElementById("displayHarga").value = "";
    document.getElementById("gambar").value = "";
    document.getElementById("deskripsi").value = "";
    document.getElementById("editId").value = "";
    alert("Form telah dibersihkan.");
}
</script>

<script type="module" src="app.js?v=2.4"></script>

</body>
</html>

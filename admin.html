<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - Gaming Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; padding: 20px; margin: 0; }
    .box { background: #1e293b; padding: 25px; border-radius: 15px; max-width: 450px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid #334155; }
    h1 { text-align: center; margin-bottom: 20px; font-size: 22px; color: #00d2ff; }
    
    label { font-size: 12px; color: #94a3b8; margin-top: 10px; display: block; }
    input, textarea, select { 
      width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; 
      border: 1px solid #334155; box-sizing: border-box; background: #0f172a; color: white;
    }
    
    textarea { height: 80px; resize: vertical; }

    button { width: 100%; padding: 12px; margin-top: 15px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .btn-tambah { background: #00d2ff; color: #0f172a; }
    .btn-tambah:hover { background: #3a7bd5; color: white; }
    .btn-lihat { background: #64748b; color: white; margin-top: 10px; }
    
    .produk-container { max-width: 600px; margin: 40px auto; }
    .card-admin { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid #334155; }
    .card-admin img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; }
    .info { flex-grow: 1; }
    .info h4 { margin: 0; font-size: 14px; }
    .info p { margin: 2px 0; font-size: 12px; color: #10b981; font-weight: bold; }
    
    .btn-action { display: flex; flex-direction: column; gap: 5px; }
    .btn-edit { background: #3a7bd5; padding: 5px 10px; font-size: 11px; border-radius: 4px; color: white; border: none; }
    .btn-hapus { background: #ef4444; padding: 5px 10px; font-size: 11px; border-radius: 4px; color: white; border: none; }
    
    h2 { border-bottom: 2px solid #334155; padding-bottom: 10px; font-size: 18px; }
  </style>
</head>

<body>

<div class="box">
  <h1>🛠️ Admin Panel Akun</h1>

  <label>Nama Akun</label>
  <input type="text" id="nama" placeholder="Contoh: Akun FF Old">
  
  <label>Harga (Hanya Angka)</label>
  <input type="number" id="harga" placeholder="Contoh: 500000">
  
  <label>Pilih Game</label>
  <select id="kategori">
    <option value="Mobile Legends">Mobile Legends</option>
    <option value="Free Fire">Free Fire</option>
    <option value="PUBG Mobile">PUBG Mobile</option>
    <option value="Lainnya">Lainnya</option>
  </select>

  <label>Status Ketersediaan</label>
  <select id="status">
    <option value="Ready">READY STOK</option>
    <option value="Sold">TERJUAL (SOLD)</option>
  </select>
  
  <label>Spesifikasi / Deskripsi</label>
  <textarea id="deskripsi" placeholder="Skin, Rank, Login, dll..."></textarea>
  
  <label>Link Gambar Akun</label>
  <input type="text" id="gambar" placeholder="Tempel link foto di sini">
  
  <input type="hidden" id="editId">
  
  <button class="btn-tambah" onclick="submitProduk()">+ SIMPAN DATA AKUN</button>
  <button class="btn-lihat" onclick="window.location.href='index.html'">👀 LIHAT TOKO</button>
</div>

<div class="produk-container">
  <h2>Daftar Akun Kamu</h2>
  <div id="produk">
    </div>
</div>

<script type="module" src="app.js"></script>

</body>
</html>

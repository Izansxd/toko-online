<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Gaming Store - Jual Akun Game Murah</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00d2ff;
      --secondary: #3a7bd5;
      --dark: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --danger: #ef4444;
      --success: #10b981;
      --warning: #f1c40f;
      --input-bg: #1e293b;
      --input-border: #334155;
    }

    body { 
      font-family: 'Poppins', sans-serif; 
      background-color: var(--dark); 
      color: var(--text);
      margin: 0; 
      padding: 0;
      overflow-x: hidden;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      padding: 40px 15px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
    }

    header h2 { margin: 0; font-weight: 700; letter-spacing: 1px; font-size: 24px; }
    header p { margin: 8px 0 0; font-size: 14px; opacity: 0.9; }

    /* Announcement */
    .announcement-bar {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 10px 0;
      overflow: hidden;
      display: flex;
      align-items: center;
    }
    .announcement-label {
      background: var(--danger);
      color: white;
      padding: 2px 10px;
      font-size: 10px;
      font-weight: 800;
      border-radius: 4px;
      margin-left: 15px;
      z-index: 10;
      white-space: nowrap;
    }

    /* Filter Kategori */
    .filter-container {
      display: flex;
      gap: 10px;
      padding: 25px 15px 5px;
      overflow-x: auto;
      max-width: 1000px;
      margin: auto;
      white-space: nowrap;
      scrollbar-width: none;
    }
    .filter-container::-webkit-scrollbar { display: none; }
    
    .btn-filter {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
      padding: 10px 22px;
      border-radius: 25px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-filter.active {
      background-color: var(--primary) !important;
      color: var(--dark) !important;
      border-color: var(--primary) !important;
      box-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
      transform: scale(1.05);
    }

    /* Search Bar */
    .search-container {
      max-width: 1000px;
      margin: 15px auto;
      padding: 0 15px;
    }
    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-box input {
      width: 100%;
      padding: 12px 15px 12px 45px;
      border-radius: 15px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: white;
      font-size: 14px;
      outline: none;
    }
    .search-box i { position: absolute; left: 15px; color: #94a3b8; font-style: normal; }

    /* Produk Grid */
    #produk { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 15px; 
      max-width: 1000px; 
      margin: 10px auto 30px; 
      padding: 0 15px;
    }
    .card { 
      background: var(--card-bg); 
      border-radius: 18px; 
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
    }
    .card-img-container { position: relative; width: 100%; height: 140px; }
    .card img { width: 100%; height: 100%; object-fit: cover; }
    .badge {
      position: absolute; top: 10px; left: 10px;
      background: rgba(15, 23, 42, 0.8);
      color: var(--primary); padding: 4px 10px;
      font-size: 10px; border-radius: 6px; font-weight: 700;
      border: 1px solid var(--primary);
    }
    .sold-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.7);
      display: flex; align-items: center; justify-content: center;
    }
    .sold-label {
      background: var(--danger); color: white; padding: 5px 15px;
      font-weight: 800; font-size: 14px; border-radius: 5px;
      transform: rotate(-15deg); border: 2px solid white;
    }
    .card-info { padding: 15px; flex-grow: 1; }
    .card h4 { margin: 0; font-size: 14px; }
    .card .deskripsi-teks { font-size: 11px; color: #94a3b8; margin: 8px 0; min-height: 33px; }
    .card .harga { color: var(--success); font-weight: 700; font-size: 16px; margin: 5px 0 12px 0; }
    .card button { 
      background: linear-gradient(90deg, var(--secondary), var(--primary));
      color: white; border: none; padding: 12px; border-radius: 12px; 
      cursor: pointer; width: 100%; font-weight: 700;
    }

    /* --- PERBAIKAN TESTIMONI (TIDAK RAKSASA) --- */
    .testimoni-section { max-width: 1000px; margin: 40px auto; padding: 0 15px; }
    #list-testimoni { 
      display: flex; 
      gap: 15px; 
      overflow-x: auto; 
      padding: 10px 5px 20px; 
      scrollbar-width: none; 
    }
    #list-testimoni::-webkit-scrollbar { display: none; }
    .card-testi { 
      min-width: 180px; 
      max-width: 180px; 
      background: var(--card-bg); 
      border-radius: 15px; 
      padding: 10px; 
      border: 1px solid var(--input-border); 
      flex-shrink: 0; 
    }
    .card-testi img { 
      width: 100%; 
      height: 220px; 
      object-fit: cover; 
      border-radius: 10px; 
    }
    .card-testi p { margin: 10px 0 0; font-size: 11px; color: #94a3b8; text-align: center; }

    /* --- PERBAIKAN DRAWER & TOMBOL CEK (LURUS) --- */
    .btn-buka-status {
      position: fixed; bottom: 25px; right: 25px;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      width: 65px; height: 65px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; box-shadow: 0 8px 25px rgba(0, 210, 255, 0.4);
      cursor: pointer; z-index: 999; border: 2px solid rgba(255,255,255,0.3);
    }

    .drawer-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(6px);
      display: none; z-index: 10000; opacity: 0; transition: opacity 0.3s;
    }
    .drawer-overlay.show { display: block; opacity: 1; }

    .drawer-content {
      position: fixed; bottom: -100%; left: 0; width: 100%;
      background: var(--card-bg); border-top-left-radius: 30px; border-top-right-radius: 30px;
      padding: 30px 20px 40px; z-index: 10001;
      transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
    }
    .drawer-content.active { bottom: 0; }

    .status-input-group { 
      display: flex; 
      gap: 10px; 
      width: 100%; 
      align-items: center; /* Kunci agar tombol & input lurus sejajar */
    }
    .status-input-group input {
      flex: 1; background: var(--dark); border: 1px solid var(--input-border);
      color: white; padding: 14px; border-radius: 12px; font-size: 14px; outline: none; min-width: 0;
    }
    .btn-cek {
      background: var(--primary); color: var(--dark); border: none;
      padding: 14px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; 
      white-space: nowrap; /* Kunci agar teks CEK tidak miring/turun kebawah */
    }
    #hasilStatus {
      margin-top: 20px; padding: 15px; border-radius: 15px;
      background: var(--dark); border: 1px solid var(--primary); display: none;
    }

    /* Modal Struk */
    #modalStruk {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(8px);
    }
    .struk-box {
      background: #fff; color: #333; width: 90%; max-width: 380px; padding: 25px; border-radius: 5px;
      font-family: 'Courier New', monospace; position: relative;
    }

    footer { text-align: center; padding: 40px 20px; font-size: 12px; color: #64748b; border-top: 1px solid var(--input-border); }
    @media (min-width: 768px) { #produk { grid-template-columns: repeat(3, 1fr); } }
  </style>
</head>
<body>

<header>
  <h2>🎮 GAMING STORE</h2>
  <p>Akun Game Sultan, Harga Rakyat.</p>
</header>

<div class="announcement-bar">
  <div class="announcement-label">INFO</div>
  <marquee id="isiPengumuman" behavior="scroll" direction="left" style="color: #94a3b8; font-size: 12px;">
    Memuat informasi terbaru dari Faza Store...
  </marquee>
</div>

<div class="filter-container">
  <button class="btn-filter active" onclick="filterGame(this, 'Semua')">Semua</button>
  <button class="btn-filter" onclick="filterGame(this, 'Mobile Legends')">MLBB</button>
  <button class="btn-filter" onclick="filterGame(this, 'Free Fire')">FF</button>
  <button class="btn-filter" onclick="filterGame(this, 'PUBG Mobile')">PUBG</button>
  <button class="btn-filter" onclick="filterGame(this, 'Lainnya')">Lainnya</button>
</div>

<div class="search-container">
  <div class="search-box">
    <i>🔍</i>
    <input type="text" id="searchInput" placeholder="Cari akun impianmu..." oninput="searchProduk()" autocomplete="off">
  </div>
</div>

<div id="produk"></div>

<div class="testimoni-section">
  <div style="padding: 0 5px; margin-bottom: 15px; border-left: 4px solid var(--primary);">
    <h2 style="font-size: 18px; margin: 0; padding-left: 10px;">💬 TESTIMONI</h2>
  </div>
  <div id="list-testimoni"></div>
</div>

<div class="btn-buka-status" onclick="toggleDrawer(true)">
  🚚
</div>

<div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer(false)"></div>
<div class="drawer-content" id="statusDrawer">
  <div style="width: 40px; height: 5px; background: #334155; margin: -15px auto 20px; border-radius: 10px;"></div>
  <label style="color: var(--primary); font-weight: 800; font-size: 14px; display: block; text-align: center; margin-bottom: 20px;">CEK STATUS PESANAN</label>
  <div class="status-input-group">
    <input type="text" id="inputCekStatus" placeholder="Masukkan ID Invoice (INV-xxx)">
    <button class="btn-cek" onclick="cekStatusPesanan()">CEK</button>
  </div>
  <div id="hasilStatus"></div>
  <button onclick="toggleDrawer(false)" style="width: 100%; background: none; border: none; color: #64748b; margin-top: 25px; cursor: pointer; font-family: 'Poppins'; font-weight: 600;">TUTUP</button>
</div>

<div id="modalStruk">
  <div class="struk-box">
    <h2 style="text-align: center; margin: 0;">FAZA STORE</h2>
    <p style="text-align: center; font-size: 10px;" id="tglStruk"></p>
    <div style="border-top: 1px dashed #999; margin: 15px 0;"></div>
    <div id="isiStruk"></div>
    <div style="border-top: 1px dashed #999; margin: 15px 0;"></div>
    <label style="font-size: 11px; font-weight: 800;">Pilih Pembayaran:</label>
    <select id="metodeBayar" style="width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; background: #f1f5f9; border: 1px solid #cbd5e1;">
      <option value="DANA">DANA</option>
      <option value="OVO">OVO</option>
      <option value="GoPay">GoPay</option>
      <option value="Transfer Bank">Transfer Bank</option>
    </select>
    <button onclick="kirimInvoiceWA()" style="width: 100%; padding: 14px; background: #000; color: #fff; border: none; border-radius: 8px; margin-top: 15px; font-weight: 800; cursor: pointer;">BAYAR SEKARANG</button>
    <button onclick="tutupStruk()" style="width: 100%; background: none; border: none; color: #888; font-size: 11px; margin-top: 10px; cursor: pointer;">Batalkan</button>
  </div>
</div>

<footer>&copy; 2026 Gaming Store Indonesia.</footer>

<script type="module" src="app.js?v=701"></script>
<script>
  setInterval(() => {
    const tgl = new Date();
    const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
    if(document.getElementById("tglStruk")) {
      document.getElementById("tglStruk").innerText = tgl.toLocaleDateString('id-ID', options);
    }
  }, 1000);
</script>
</body>
</html>

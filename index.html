<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Gaming Store - Jual Akun Game Murah</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00d2ff;
      --secondary: #3a7bd5;
      --dark: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --danger: #ef4444;
      --success: #10b981;
      --warning: #f1c40f;
      --input-bg: #1e293b;
      --input-border: #334155;
    }

    body { 
      font-family: 'Poppins', sans-serif; 
      background-color: var(--dark); 
      color: var(--text);
      margin: 0; 
      padding: 0;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      padding: 40px 15px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
    }

    header h2 { margin: 0; font-weight: 700; letter-spacing: 1px; font-size: 24px; }
    header p { margin: 8px 0 0; font-size: 14px; opacity: 0.9; }

    /* Running Text Style */
    .announcement-bar {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 10px 0;
      overflow: hidden;
      display: flex;
      align-items: center;
    }
    .announcement-label {
      background: var(--danger);
      color: white;
      padding: 2px 10px;
      font-size: 10px;
      font-weight: 800;
      border-radius: 4px;
      margin-left: 15px;
      z-index: 10;
      white-space: nowrap;
      box-shadow: 2px 0 10px rgba(0,0,0,0.5);
    }

    /* Filter Kategori */
    .filter-container {
      display: flex;
      gap: 10px;
      padding: 25px 15px 5px;
      overflow-x: auto;
      max-width: 1000px;
      margin: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    
    .filter-container::-webkit-scrollbar { display: none; }
    
    .btn-filter {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
      padding: 10px 22px;
      border-radius: 25px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-block;
    }

    .btn-filter.active {
      background-color: var(--primary) !important;
      color: var(--dark) !important;
      border-color: var(--primary) !important;
      box-shadow: 0 0 15px rgba(0, 210, 255, 0.5) !important;
      transform: scale(1.05);
    }

    /* Search Bar Styling */
    .search-container {
      max-width: 1000px;
      margin: 15px auto;
      padding: 0 15px;
    }

    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-box input {
      width: 100%;
      padding: 12px 15px 12px 45px;
      border-radius: 15px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
    }

    .search-box i {
      position: absolute;
      left: 15px;
      color: #94a3b8;
      font-size: 16px;
      font-style: normal;
    }

    /* --- CSS CEK STATUS --- */
    .status-container {
      max-width: 1000px;
      margin: 10px auto 20px;
      padding: 0 15px;
    }
    .status-box {
      background: rgba(0, 210, 255, 0.05);
      border: 1px dashed var(--primary);
      padding: 15px;
      border-radius: 18px;
    }
    .status-box label {
      font-size: 10px;
      font-weight: 800;
      color: var(--primary);
      display: block;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .status-input-group {
      display: flex;
      gap: 10px;
    }
    .status-input-group input {
      flex-grow: 1;
      background: var(--dark);
      border: 1px solid var(--input-border);
      color: white;
      padding: 12px 15px;
      border-radius: 12px;
      font-size: 13px;
      outline: none;
      font-family: 'Poppins', sans-serif;
    }
    .btn-cek {
      background: var(--primary);
      color: var(--dark);
      border: none;
      padding: 0 20px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-cek:hover { background: var(--secondary); color: white; }
    #hasilStatus {
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      font-size: 12px;
      display: none;
      background: #1e293b;
      border: 1px solid #334155;
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Grid Produk */
    #produk { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 15px; 
      max-width: 1000px; 
      margin: 10px auto 30px; 
      padding: 0 15px;
      min-height: 300px;
    }
    
    .card { 
      background: var(--card-bg); 
      border-radius: 18px; 
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .card-img-container { position: relative; width: 100%; height: 140px; }
    .card img { width: 100%; height: 100%; object-fit: cover; }

    .badge {
      position: absolute; top: 10px; left: 10px;
      background: rgba(15, 23, 42, 0.8);
      color: var(--primary); padding: 4px 10px;
      font-size: 10px; border-radius: 6px; font-weight: 700;
      text-transform: uppercase; backdrop-filter: blur(4px);
      border: 1px solid var(--primary); z-index: 2;
    }

    .badge-promo {
      position: absolute; top: 10px; right: 10px;
      background: linear-gradient(45deg, #f1c40f, #e67e22);
      color: #000; padding: 4px 10px;
      font-size: 10px; border-radius: 6px; font-weight: 800;
      z-index: 3;
    }

    .sold-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.7);
      display: flex; align-items: center; justify-content: center; z-index: 5;
    }

    .sold-label {
      background: var(--danger); color: white; padding: 5px 15px;
      font-weight: 800; font-size: 14px; border-radius: 5px;
      transform: rotate(-15deg); border: 2px solid white;
    }

    .card-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
    .card h4 { margin: 0; font-size: 14px; font-weight: 600; text-align: left; }
    .card .deskripsi-teks { font-size: 11px; color: #94a3b8; margin: 8px 0; min-height: 33px; }
    .card .harga { color: var(--success); font-weight: 700; font-size: 16px; margin: 5px 0 12px 0; }
    .harga-lama { font-size: 11px; color: #94a3b8; text-decoration: line-through; margin-right: 5px; }

    .card button { 
      background: linear-gradient(90deg, var(--secondary), var(--primary));
      color: white; border: none; padding: 12px; border-radius: 12px; 
      cursor: pointer; width: 100%; font-weight: 700; font-size: 11px;
    }

    /* Testimoni */
    .testimoni-section { max-width: 1000px; margin: 40px auto; padding: 0 15px; }
    .testimoni-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; border-left: 4px solid var(--primary); padding-left: 15px; }
    #list-testimoni { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
    .card-testi { min-width: 220px; background: var(--card-bg); border-radius: 15px; padding: 12px; border: 1px solid var(--input-border); flex-shrink: 0; }
    .card-testi img { width: 100%; height: 280px; object-fit: cover; border-radius: 10px; }
    .card-testi p { margin: 10px 0 0; font-size: 12px; color: #94a3b8; text-align: center; }

    /* MODAL STRUK */
    #modalStruk {
      display: none; 
      position: fixed; 
      top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.9); 
      z-index: 9999; 
      align-items: center; 
      justify-content: center; 
      backdrop-filter: blur(8px);
    }
    .struk-box {
      background: #ffffff; 
      color: #333;
      width: 90%; 
      max-width: 380px; 
      border-radius: 5px; 
      padding: 25px; 
      position: relative;
      font-family: 'Courier New', Courier, monospace;
    }
    .struk-box::before, .struk-box::after {
      content: ""; position: absolute; left: 0; width: 100%; height: 10px;
      background: radial-gradient(circle, transparent, transparent 50%, #ffffff 50%, #ffffff);
      background-size: 20px 20px;
    }
    .struk-box::before { top: -10px; }
    .struk-box::after { bottom: -10px; transform: rotate(180deg); }
    
    .struk-box h2 { text-align: center; margin: 0; font-size: 18px; color: #000; font-weight: 800; }
    .struk-box p { text-align: center; font-size: 10px; margin: 5px 0; color: #666; }
    .line { border-top: 1px dashed #999; margin: 15px 0; }
    
    .select-bayar {
      width: 100%; padding: 12px; border-radius: 8px; 
      background: #f1f5f9; color: #333; border: 1px solid #cbd5e1; 
      margin-top: 15px; font-family: 'Poppins', sans-serif; font-weight: 600;
    }

    .btn-konfirmasi {
      width: 100%; padding: 14px; background: #000; color: #fff; 
      border: none; border-radius: 8px; margin-top: 15px; 
      font-weight: 800; cursor: pointer; font-family: 'Poppins', sans-serif;
    }

    footer { text-align: center; padding: 40px 20px; font-size: 12px; color: #64748b; border-top: 1px solid var(--input-border); }

    @media (min-width: 768px) { #produk { grid-template-columns: repeat(3, 1fr); } }
  </style>
</head>
<body>

<header>
  <h2>🎮 GAMING STORE</h2>
  <p>Akun Game Sultan, Harga Rakyat.</p>
</header>

<div class="announcement-bar">
  <div class="announcement-label">INFO</div>
  <marquee id="isiPengumuman" behavior="scroll" direction="left" style="color: #94a3b8; font-size: 12px; font-weight: 500;">
    Memuat informasi terbaru dari Faza Store...
  </marquee>
</div>

<div class="filter-container">
  <button class="btn-filter active" onclick="filterGame(this, 'Semua')">Semua</button>
  <button class="btn-filter" onclick="filterGame(this, 'Mobile Legends')">MLBB</button>
  <button class="btn-filter" onclick="filterGame(this, 'Free Fire')">FF</button>
  <button class="btn-filter" onclick="filterGame(this, 'PUBG Mobile')">PUBG</button>
  <button class="btn-filter" onclick="filterGame(this, 'Lainnya')">Lainnya</button>
</div>

<div class="search-container">
  <div class="search-box">
    <i>🔍</i>
    <input type="text" id="searchInput" placeholder="Cari akun impianmu..." oninput="searchProduk()" autocomplete="off">
  </div>
</div>

<div class="status-container">
  <div class="status-box">
    <label>CEK STATUS PESANAN (INPUT ID INVOICE):</label>
    <div class="status-input-group">
      <input type="text" id="inputCekStatus" placeholder="Masukkan ID Pesanan (Contoh: INV-8273)">
      <button class="btn-cek" onclick="cekStatusPesanan()">CEK</button>
    </div>
    <div id="hasilStatus"></div>
  </div>
</div>

<div id="produk"></div>

<div class="testimoni-section">
  <div class="testimoni-header">
    <h2>💬 TESTIMONI PEMBELI</h2>
  </div>
  <div id="list-testimoni"></div>
</div>

<div id="modalStruk">
  <div class="struk-box">
    <h2>FAZA STORE</h2>
    <p>Jl. Gaming No. 1, Indonesia</p>
    <p id="tglStruk"></p>
    <div class="line"></div>
    
    <div id="isiStruk"></div>
    
    <div class="line"></div>
    <label style="font-size: 11px; font-weight: 800; font-family: 'Poppins';">Pilih Pembayaran:</label>
    <select id="metodeBayar" class="select-bayar">
      <option value="DANA">DANA</option>
      <option value="OVO">OVO</option>
      <option value="GoPay">GoPay</option>
      <option value="ShopeePay">ShopeePay</option>
      <option value="Transfer Bank">Transfer Bank</option>
    </select>

    <button onclick="kirimInvoiceWA()" class="btn-konfirmasi">BAYAR SEKARANG</button>
    <button onclick="tutupStruk()" style="width: 100%; background: none; border: none; color: #888; font-size: 11px; margin-top: 10px; cursor: pointer; font-family: 'Poppins';">Batalkan Pesanan</button>
  </div>
</div>

<footer>
  &copy; 2026 Gaming Store Indonesia. All Rights Reserved.
</footer>

<script type="module" src="app.js?v=700"></script>

<script>
  setInterval(() => {
    const tgl = new Date();
    const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
    if(document.getElementById("tglStruk")) {
      document.getElementById("tglStruk").innerText = tgl.toLocaleDateString('id-ID', options);
    }
  }, 1000);
</script>

</body>
</html>

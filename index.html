<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Gaming Store - Jual Akun Game Murah</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00d2ff;
      --secondary: #3a7bd5;
      --dark: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --danger: #ef4444;
      --success: #10b981;
    }

    body { 
      font-family: 'Poppins', sans-serif; 
      background-color: var(--dark); 
      color: var(--text);
      margin: 0; 
      padding: 0;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      padding: 40px 15px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
    }

    header h2 { margin: 0; font-weight: 700; letter-spacing: 1px; font-size: 24px; }
    header p { margin: 8px 0 0; font-size: 14px; opacity: 0.9; }

    /* CSS untuk Filter Kategori */
    .filter-container {
      display: flex;
      gap: 10px;
      padding: 25px 15px 5px;
      overflow-x: auto;
      max-width: 1000px;
      margin: auto;
      scrollbar-width: none; /* Sembunyikan scrollbar di Firefox */
    }
    
    .filter-container::-webkit-scrollbar {
      display: none; /* Sembunyikan scrollbar di Chrome/Safari */
    }
    
    .btn-filter {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-filter.active {
      background: var(--primary);
      color: var(--dark);
      border-color: var(--primary);
      box-shadow: 0 0 10px rgba(0, 210, 255, 0.4);
    }

    /* Grid Produk */
    #produk { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 15px; 
      max-width: 1000px; 
      margin: 20px auto 30px; 
      padding: 0 15px;
    }
    
    /* Kartu Produk */
    .card { 
      background: var(--card-bg); 
      border-radius: 18px; 
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: var(--primary);
    }
    
    .card-img-container {
      position: relative;
      width: 100%;
      height: 140px;
    }

    .card img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
    }

    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(15, 23, 42, 0.8);
      color: var(--primary);
      padding: 4px 10px;
      font-size: 10px;
      border-radius: 6px;
      font-weight: 700;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
      border: 1px solid var(--primary);
      z-index: 2;
    }

    .sold-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    .sold-label {
      background: var(--danger);
      color: white;
      padding: 5px 15px;
      font-weight: 800;
      font-size: 14px;
      border-radius: 5px;
      transform: rotate(-15deg);
      border: 2px solid white;
    }

    .card-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
    .card h4 { margin: 0; font-size: 14px; font-weight: 600; line-height: 1.3; text-align: left; }
    .card .deskripsi-teks { font-size: 11px; color: #94a3b8; margin: 8px 0; line-height: 1.5; text-align: left; min-height: 33px; }
    .card .harga { color: var(--success); font-weight: 700; font-size: 16px; margin: 5px 0 12px 0; text-align: left; }

    .card button { 
      background: linear-gradient(90deg, var(--secondary), var(--primary));
      color: white; border: none; padding: 12px; border-radius: 12px; 
      cursor: pointer; width: 100%; font-weight: 700; font-size: 11px;
      text-transform: uppercase; transition: 0.2s;
    }

    .card button:disabled { background: #475569; cursor: not-allowed; opacity: 0.8; }

    footer { text-align: center; padding: 40px 20px; font-size: 12px; color: #64748b; }

    @media (min-width: 768px) {
      #produk { grid-template-columns: repeat(3, 1fr); gap: 20px; }
      .card-img-container { height: 180px; }
    }
    @media (min-width: 1024px) {
      #produk { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <h2>🎮 GAMING STORE</h2>
  <p>Akun Game Sultan, Harga Rakyat.</p>
</header>

<div class="filter-container">
  <button class="btn-filter active" onclick="filterGame('Semua')">Semua</button>
  <button class="btn-filter" onclick="filterGame('Mobile Legends')">MLBB</button>
  <button class="btn-filter" onclick="filterGame('Free Fire')">FF</button>
  <button class="btn-filter" onclick="filterGame('PUBG Mobile')">PUBG</button>
  <button class="btn-filter" onclick="filterGame('Lainnya')">Lainnya</button>
</div>

<div id="produk">
  </div>

<footer>
  &copy; 2026 Gaming Store Indonesia. All Rights Reserved.
</footer>

<script type="module" src="app.js"></script>

</body>
</html>

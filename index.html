<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Toko Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 10px; margin: 0; }
    h2 { text-align: center; margin-top: 20px; }
    
    #produk { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 15px; 
      max-width: 800px; 
      margin: 20px auto; 
    }
    
    .card { 
      background: white; 
      padding: 10px; 
      border-radius: 12px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
      text-align: center; 
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    
    .card img { 
      width: 100%; 
      height: 120px; 
      object-fit: cover; 
      border-radius: 8px; 
    }

    .card h4 { margin: 10px 0 5px; font-size: 14px; }

    /* CSS Tambahan untuk Deskripsi */
    .card .deskripsi-teks { 
      font-size: 11px; 
      color: #666; 
      margin: 5px 0; 
      line-height: 1.4;
      /* Membatasi deskripsi agar tidak merusak tinggi kotak */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card p.harga { color: #2ecc71; font-weight: bold; margin: 5px 0; font-size: 15px; }

    .card button { 
      background: #27ae60; 
      color: white; 
      border: none; 
      padding: 10px; 
      border-radius: 6px; 
      cursor: pointer; 
      width: 100%;
      font-weight: bold;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<h2>🛍️ Toko Online</h2>

<div id="produk"></div>

<script type="module" src="app.js"></script>

</body>
</html>

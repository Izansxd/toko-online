<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Faza Store - Jual Akun Game Murah</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script type="text/javascript">
     (function(){ emailjs.init("vj_Kj-N52AowtKruT"); })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00d2ff;
      --secondary: #3a7bd5;
      --dark: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --danger: #ef4444;
      --success: #10b981;
      --input-border: #334155;
    }
    body { font-family: 'Poppins', sans-serif; background-color: var(--dark); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
    #toast {
      visibility: hidden;
      min-width: 250px;
      background-color: var(--success);
      color: #fff;
      text-align: center;
      border-radius: 12px;
      padding: 16px;
      position: fixed;
      z-index: 200000;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      font-weight: 600;
      font-size: 13px;
    }
    #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
    @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
    @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    header { background: linear-gradient(135deg, var(--secondary), var(--primary)); padding: 40px 15px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
    .announcement-bar { background: #1e293b; border-bottom: 1px solid var(--input-border); padding: 10px 0; display: flex; align-items: center; }
    .announcement-label { background: var(--danger); color: white; padding: 2px 10px; font-size: 10px; font-weight: 800; border-radius: 4px; margin-left: 15px; }
    .filter-container { display: flex; gap: 10px; padding: 15px; overflow-x: auto; }
    .btn-filter { background: #1e293b; color: #94a3b8; border: 1px solid var(--input-border); padding: 10px 22px; border-radius: 25px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-filter.active { background-color: var(--primary); color: var(--dark); }
    #produk { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1000px; margin: 10px auto; padding: 0 15px; }
    .card { background: var(--card-bg); border-radius: 18px; overflow: hidden; border: 1px solid var(--input-border); transition: 0.3s; }
    .card img { width: 100%; height: 140px; object-fit: cover; }
    .card-info { padding: 12px; }
    .badge { position: absolute; background: rgba(0,0,0,0.7); color: var(--primary); padding: 4px 8px; font-size: 10px; border-radius: 5px; }
    .harga-baru { color: var(--success); font-weight: 700; font-size: 15px; display: block; margin-bottom: 10px; }
    .btn-beli { background: linear-gradient(90deg, var(--secondary), var(--primary)); color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; font-weight: 700; cursor: pointer; }
    #modalStruk, #modalInbox, #modalLacak, #modalDetail { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
    .struk-box, .inbox-box { background: white; color: #1a1a1a; width: 100%; max-width: 350px; padding: 20px; border-radius: 16px; max-height: 90vh; overflow-y: auto; }
    .inbox-box { background: #1e293b; color: white; }
    .struk-item { display: flex; justify-content: space-between; font-size: 12px; margin: 4px 0; }
    .struk-total { display: flex; justify-content: space-between; font-weight: bold; margin-top: 10px; padding-top: 10px; border-top: 2px solid #1a1a1a; }
    .struk-box input, .struk-box select, .struk-box textarea { width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #cbd5e1; background: #f1f5f9; }
    .struk-box label { font-size: 10px; font-weight: bold; display: block; margin-top: 8px; }
    .btn-inbox { position: fixed; bottom: 20px; left: 20px; background: #10b981; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; box-shadow: 0 4px 15px rgba(16,185,129,0.4); cursor: pointer; font-size: 20px; z-index: 100; }
    .btn-buka-status { position: fixed; bottom: 20px; right: 20px; background: var(--primary); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; font-size: 20px; z-index: 100; }
    .inbox-item { background: #0f172a; padding: 12px; border-radius: 12px; margin-bottom: 8px; border-left: 3px solid var(--primary); }
    .inbox-item p { margin: 0; font-size: 12px; }
    .sales-notification { position: fixed; bottom: 85px; left: -350px; background: white; padding: 8px 12px; border-radius: 10px; display: flex; align-items: center; gap: 10px; transition: 0.6s; border-left: 4px solid #10b981; width: 210px; pointer-events: none; z-index: 100000; }
    .sales-notification.show { left: 15px; }
  </style>
</head>
<body>
<div id="toast"></div>
<header><h2>🎮 FAZA STORE</h2><p>Akun Game Murah, Aman & Terpercaya</p></header>
<div class="announcement-bar"><div class="announcement-label">INFO</div><marquee id="isiPengumuman">Memuat info toko...</marquee></div>
<div class="filter-container">
  <button class="btn-filter active" onclick="filterGame(this,'Semua')">Semua</button>
  <button class="btn-filter" onclick="filterGame(this,'Mobile Legends')">MLBB</button>
  <button class="btn-filter" onclick="filterGame(this,'Free Fire')">FF</button>
  <button class="btn-filter" onclick="filterGame(this,'PUBG Mobile')">PUBG</button>
</div>
<div id="produk"></div>
<div class="testimoni-section" style="max-width:1000px; margin:30px auto; padding:0 15px;">
  <h3 style="color:var(--primary);">💬 TESTIMONI</h3>
  <div id="list-testimoni" style="display:flex; gap:10px; overflow-x:auto;"></div>
</div>

<!-- Modal Struk (Pembelian + Upload) -->
<div id="modalStruk">
  <div class="struk-box">
    <div id="isiStruk"></div>
    <button id="btnKirimBukti" style="width:100%; padding:15px; background:#10b981; color:#fff; border:none; border-radius:10px; font-weight:800; margin-top:20px;">📤 KIRIM BUKTI & PESAN</button>
    <button onclick="tutupStruk()" style="width:100%; background:none; border:none; color:#888; margin-top:10px;">Kembali</button>
  </div>
</div>

<!-- Modal Inbox -->
<div id="modalInbox">
  <div class="inbox-box">
    <h3 style="text-align:center;">📬 INBOX</h3>
    <div id="listInbox" style="max-height:400px; overflow-y:auto;"></div>
    <button onclick="document.getElementById('modalInbox').style.display='none'" style="width:100%; background:#334155; color:white; border:none; padding:10px; border-radius:10px; margin-top:15px;">Tutup</button>
  </div>
</div>

<div id="modalLacak"><div class="lacak-box">...</div></div>
<div id="modalDetail"><div class="detail-box">...</div></div>

<div id="salesNotif" class="sales-notification"><img src="https://cdn-icons-png.flaticon.com/512/5637/5637217.png"><div class="sales-text"><b id="notifUser">Faza Store</b><span id="notifProduk">Baru saja membeli produk</span></div></div>

<button class="btn-inbox" onclick="window.bukaInbox()">📬</button>
<button class="btn-buka-status" onclick="document.getElementById('modalLacak').style.display='flex'">🚚</button>

<footer style="text-align:center; padding:30px; font-size:11px;">&copy; 2026 Faza Store</footer>

<script>
window.showToast = function(pesan,warna="#10b981"){ let t=document.getElementById("toast"); if(t){ t.innerText=pesan; t.style.backgroundColor=warna; t.className="show"; setTimeout(()=>t.className="",3000); } };
window.tutupStruk = ()=>document.getElementById('modalStruk').style.display='none';
window.filterGame = function(el,game){ document.querySelectorAll('.btn-filter').forEach(btn=>btn.classList.remove('active')); el.classList.add('active'); if(window.jalankanFilter) window.jalankanFilter(game); };
window.bukaInbox = function(){ document.getElementById('modalInbox').style.display='flex'; if(window.muatInbox) window.muatInbox(); };
window.handleLacak = function(){ let id=document.getElementById("inputCekPesanan").value; if(id) window.cekStatusPesanan(id); };
</script>
<script type="module" src="app.js?v=4.0"></script>
</body>
</html>

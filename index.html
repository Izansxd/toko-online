<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Gaming Store - Jual Akun Game Murah</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00d2ff;
      --secondary: #3a7bd5;
      --dark: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --danger: #ef4444;
      --success: #10b981;
      --warning: #f1c40f;
      --input-bg: #1e293b;
      --input-border: #334155;
      --verified: #38bdf8;
    }

    /* --- TEMA TERANG (LIGHT MODE) --- */
    body.light-mode {
      --dark: #f1f5f9;
      --card-bg: #ffffff;
      --text: #1e293b;
      --input-bg: #f8fafc;
      --input-border: #cbd5e1;
    }
    body.light-mode .announcement-bar { background: #e2e8f0; }
    body.light-mode .card { border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    body.light-mode .btn-filter { background: #e2e8f0; color: #64748b; }
    body.light-mode .drawer-content { background: #ffffff; }

    body { 
      font-family: 'Poppins', sans-serif; 
      background-color: var(--dark); 
      color: var(--text);
      margin: 0; 
      padding: 0;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      padding: 40px 15px;
      text-align: center;
      position: relative;
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
    }

    .theme-toggle {
      position: absolute; top: 15px; right: 15px;
      background: rgba(255,255,255,0.2);
      border: none; color: white; padding: 8px 12px;
      border-radius: 12px; cursor: pointer; font-size: 18px;
    }

    /* FLASH SALE TIMER */
    .flash-sale-container {
      max-width: 1000px; margin: 15px auto; padding: 0 15px;
    }
    .flash-sale-box {
      background: linear-gradient(90deg, #ff416c, #ff4b2b);
      border-radius: 15px; padding: 12px 20px;
      display: flex; justify-content: space-between; align-items: center;
      color: white; font-weight: 700; font-size: 14px;
      box-shadow: 0 5px 15px rgba(255, 65, 108, 0.3);
    }
    #timer { background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 8px; font-family: monospace; font-size: 16px; }

    /* Pengumuman */
    .announcement-bar {
      background: #1e293b; border-bottom: 1px solid var(--input-border);
      padding: 10px 0; overflow: hidden; display: flex; align-items: center;
    }
    .announcement-label {
      background: var(--danger); color: white; padding: 2px 10px;
      font-size: 10px; font-weight: 800; border-radius: 4px; margin-left: 15px; z-index: 10;
    }

    /* Kategori & Search */
    .filter-container { display: flex; gap: 10px; padding: 20px 15px 5px; overflow-x: auto; scrollbar-width: none; }
    .btn-filter { background: #1e293b; color: #94a3b8; border: 1px solid var(--input-border); padding: 10px 22px; border-radius: 25px; font-size: 13px; font-weight: 600; cursor: pointer; flex-shrink: 0; transition: 0.3s; }
    .btn-filter.active { background-color: var(--primary) !important; color: var(--dark) !important; border-color: var(--primary); }

    .search-container { max-width: 1000px; margin: 15px auto; padding: 0 15px; }
    .search-box { position: relative; display: flex; align-items: center; }
    .search-box input { width: 100%; padding: 12px 15px 12px 45px; border-radius: 15px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text); outline: none; }
    .search-box i { position: absolute; left: 15px; color: #94a3b8; font-style: normal; }

    /* Produk Grid */
    #produk { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1000px; margin: 10px auto; padding: 0 15px; }
    .card { background: var(--card-bg); border-radius: 18px; overflow: hidden; display: flex; flex-direction: column; position: relative; transition: transform 0.2s; border: 1px solid var(--input-border); }
    .card:active { transform: scale(0.98); }
    .card-img-container { position: relative; height: 140px; overflow: hidden; }
    .card img { width: 100%; height: 100%; object-fit: cover; }
    
    .sold-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7); display: flex; align-items: center; justify-content: center;
      z-index: 5; backdrop-filter: blur(2px);
    }
    .sold-label {
      background: var(--danger); color: white; padding: 6px 15px; border-radius: 6px;
      font-weight: 800; font-size: 14px; transform: rotate(-15deg); border: 2px solid white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3); letter-spacing: 1px;
    }

    .badge { position: absolute; top: 10px; left: 10px; background: rgba(15,23,42,0.8); color: var(--primary); padding: 4px 10px; font-size: 10px; border-radius: 6px; border: 1px solid var(--primary); z-index: 2; }
    .badge-promo { position: absolute; top: 10px; right: 10px; background: linear-gradient(45deg, #ff416c, #ff4b2b); color: white; padding: 4px 10px; font-size: 9px; border-radius: 6px; font-weight: 800; z-index: 2; }
    
    .card-info { padding: 12px; flex-grow: 1; position: relative; z-index: 1; }
    .card h4 { margin: 0; font-size: 13px; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .garansi-tag {
      display: inline-flex; align-items: center; gap: 3px;
      background: rgba(16, 185, 129, 0.1); color: var(--success);
      padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; margin-bottom: 8px;
      border: 0.5px solid var(--success);
    }

    .card .harga { margin: 2px 0 10px 0; display: flex; flex-direction: column; }
    .harga-lama { font-size: 10px; color: #94a3b8; text-decoration: line-through; }
    .harga-baru { color: var(--success); font-weight: 700; font-size: 15px; }

    .card button { background: linear-gradient(90deg, var(--secondary), var(--primary)); color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; font-size: 13px; }

    /* Testimoni & Footer */
    .testimoni-section { max-width: 1000px; margin: 40px auto; padding: 0 15px; }
    #list-testimoni { display: flex; gap: 15px; overflow-x: auto; scrollbar-width: none; }
    .card-testi { min-width: 180px; background: var(--card-bg); border-radius: 15px; padding: 10px; border: 1px solid var(--input-border); flex-shrink: 0; }
    .card-testi img { width: 100%; height: 220px; object-fit: cover; border-radius: 10px; }
    
    .btn-buka-status { position: fixed; bottom: 25px; right: 25px; background: linear-gradient(135deg, var(--secondary), var(--primary)); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; z-index: 999; box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4); border: none; cursor: pointer; }
    
    footer { text-align: center; padding: 40px 20px; font-size: 12px; color: #64748b; }
    @media (min-width: 768px) { #produk { grid-template-columns: repeat(3, 1fr); } }

    /* Modal & Drawer */
    .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1000; backdrop-filter: blur(4px); }
    .drawer-content { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--card-bg); padding: 30px 20px; z-index: 1001; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-top-left-radius: 25px; border-top-right-radius: 25px; }
    .drawer-content.active { bottom: 0; }
    
    #modalStruk { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    .struk-box { background: white; color: #333; width: 85%; max-width: 350px; padding: 25px; border-radius: 15px; font-family: monospace; }
    
    /* MODAL DETAIL STYLE */
    #modalDetail { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9998; align-items: center; justify-content: center; backdrop-filter: blur(8px); padding: 20px; }
    .detail-box { background: var(--card-bg); color: var(--text); width: 100%; max-width: 400px; border-radius: 24px; overflow: hidden; border: 1px solid var(--input-border); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); }
  </style>
</head>
<body>

<header>
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme">🌓</button>
  <h2>🎮 FAZA STORE</h2>
  <p>Akun Sultan, Harga Rakyat, Transaksi Aman.</p>
</header>

<div class="flash-sale-container">
  <div class="flash-sale-box">
    <span>⚡ FLASH SALE</span>
    <span id="timer">00:00:00</span>
  </div>
</div>

<div class="announcement-bar">
  <div class="announcement-label">INFO</div>
  <marquee id="isiPengumuman" behavior="scroll" direction="left" style="color: #94a3b8; font-size: 12px;">Memuat data terbaru...</marquee>
</div>

<div class="filter-container">
  <button class="btn-filter active" onclick="filterGame(this, 'Semua')">Semua</button>
  <button class="btn-filter" onclick="filterGame(this, 'Mobile Legends')">MLBB</button>
  <button class="btn-filter" onclick="filterGame(this, 'Free Fire')">FF</button>
  <button class="btn-filter" onclick="filterGame(this, 'PUBG Mobile')">PUBG</button>
</div>

<div class="filter-container" style="padding-top: 5px; margin-top: -5px;">
  <button class="btn-filter active" style="font-size: 11px; padding: 8px 15px;" onclick="filterHarga(this, 0, 999999999)">Semua Harga</button>
  <button class="btn-filter" style="font-size: 11px; padding: 8px 15px;" onclick="filterHarga(this, 0, 100000)">Dibawah 100k</button>
  <button class="btn-filter" style="font-size: 11px; padding: 8px 15px;" onclick="filterHarga(this, 100000, 500000)">100k - 500k</button>
  <button class="btn-filter" style="font-size: 11px; padding: 8px 15px;" onclick="filterHarga(this, 500000, 999999999)">Sultan 500k+</button>
</div>

<div class="search-container">
  <div class="search-box">
    <i>🔍</i>
    <input type="text" id="searchInput" placeholder="Cari akun impianmu..." oninput="searchProduk()">
  </div>
</div>

<div id="produk"></div>

<div class="testimoni-section">
  <div style="border-left: 4px solid var(--primary); padding-left: 10px; margin-bottom: 15px;">
    <h2 style="font-size: 18px; margin: 0;">💬 TESTIMONI</h2>
  </div>
  <div id="list-testimoni"></div>
</div>

<button class="btn-buka-status" onclick="toggleDrawer(true)">🚚</button>

<div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer(false)"></div>
<div class="drawer-content" id="statusDrawer">
  <div style="width: 40px; height: 4px; background: #334155; margin: -15px auto 15px; border-radius: 10px;"></div>
  <h3 style="text-align:center; margin-bottom: 20px;">Lacak Pesanan</h3>
  <div style="display:flex; gap:10px">
    <input type="text" id="inputCekStatus" placeholder="Masukkan ID Invoice" style="flex:1; padding:14px; border-radius:12px; border:1px solid var(--input-border); background:var(--dark); color:var(--text); outline: none;">
    <button onclick="cekStatusPesanan()" style="padding:14px 20px; border-radius:12px; border:none; background:var(--primary); color:var(--dark); font-weight:800">CEK</button>
  </div>
  <div id="hasilStatus" style="margin-top:20px; padding:15px; border-radius:12px; border: 1px solid var(--primary); display:none"></div>
  <button onclick="toggleDrawer(false)" style="width:100%; margin-top:25px; background:none; border:none; color:#64748b; font-weight: 600;">TUTUP</button>
</div>

<div id="modalDetail">
  <div class="detail-box">
    <div style="height: 180px; width: 100%; position: relative;">
      <img id="detailGambar" src="" style="width: 100%; height: 100%; object-fit: cover;">
      <button onclick="tutupDetail()" style="position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer;">✕</button>
    </div>
    <div style="padding: 20px;">
      <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
        <h3 id="detailNama" style="margin: 0; font-size: 18px; flex: 1;"></h3>
        <span style="color: var(--verified);">🔵</span>
      </div>
      <p style="font-size: 11px; font-weight: 700; color: var(--primary); margin-bottom: 5px; letter-spacing: 1px;">SPESIFIKASI AKUN:</p>
      <div id="detailDeskripsi" style="font-size: 13px; line-height: 1.6; color: #94a3b8; max-height: 180px; overflow-y: auto; white-space: pre-wrap; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; border: 1px solid var(--input-border);"></div>
      <button id="btnLanjutBeli" style="width: 100%; padding: 16px; background: linear-gradient(90deg, var(--secondary), var(--primary)); color: white; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; font-size: 14px;">LANJUT KE PEMBAYARAN</button>
      
      <button id="btnShareWA" style="width: 100%; padding: 12px; background: #25d366; color: white; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; font-size: 13px; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;">
        <span>🟢</span> Bagikan ke WhatsApp
      </button>
      
    </div>
  </div>
</div>

<div id="modalStruk">
  <div class="struk-box">
    <h2 style="text-align:center; margin: 0 0 10px 0;">FAZA STORE</h2>
    <div style="border-top: 1px dashed #ccc; margin-bottom: 10px;"></div>
    <div id="isiStruk"></div>
    <div style="border-top: 1px dashed #ccc; margin: 10px 0;"></div>
    <label style="font-size: 11px; font-weight: 700;">Metode Pembayaran:</label>
    <select id="metodeBayar" style="width:100%; padding:12px; margin-top:8px; border-radius:8px; border: 1px solid #ddd; background: #f9f9f9; font-family: 'Poppins';">
      <option value="QRIS (All Payment)">QRIS (All Payment)</option>
      <option value="DANA">DANA</option>
      <option value="GoPay">GoPay</option>
      <option value="OVO">OVO</option>
    </select>
    <button onclick="kirimInvoiceWA()" style="width:100%; padding:14px; background:#000; color:#fff; border-radius:8px; border:none; font-weight:800; margin-top:15px; cursor: pointer;">BAYAR SEKARANG</button>
    <button onclick="tutupStruk()" style="width:100%; margin-top:10px; background:none; border:none; color:#888; font-size: 11px; cursor:pointer;">Batalkan Pesanan</button>
  </div>
</div>

<footer>&copy; 2026 Faza Store Indonesia.</footer>

<script type="module" src="app.js?v=706"></script>
<script>
  function toggleTheme() {
    document.body.classList.toggle('light-mode');
    const isLight = document.body.classList.contains('light-mode');
    localStorage.setItem('faza_theme', isLight ? 'light' : 'dark');
  }
  if (localStorage.getItem('faza_theme') === 'light') {
    document.body.classList.add('light-mode');
  }

  function startRealTimer() {
    let endTime = localStorage.getItem('faza_flash_sale_end');
    if (!endTime) {
      endTime = new Date().getTime() + (6 * 60 * 60 * 1000); 
      localStorage.setItem('faza_flash_sale_end', endTime);
    }
    const display = document.querySelector('#timer');
    const x = setInterval(function() {
      const now = new Date().getTime();
      const distance = endTime - now;
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);
      if(display) display.innerHTML = (hours < 10 ? "0" + hours : hours) + ":" + (minutes < 10 ? "0" + minutes : minutes) + ":" + (seconds < 10 ? "0" + seconds : seconds);
      if (distance < 0) {
        clearInterval(x);
        display.innerHTML = "BERAKHIR";
      }
    }, 1000);
  }
  startRealTimer();

  window.toggleDrawer = function(open) {
    const drawer = document.getElementById("statusDrawer");
    const overlay = document.getElementById("drawerOverlay");
    if (open) {
      overlay.style.display = "block";
      setTimeout(() => drawer.classList.add("active"), 10);
    } else {
      drawer.classList.remove("active");
      setTimeout(() => overlay.style.display = "none", 400);
    }
  }
</script>
</body>
</html>

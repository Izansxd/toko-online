<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Gaming Store - Jual Akun Game Murah</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00d2ff;
      --secondary: #3a7bd5;
      --dark: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --danger: #ef4444;
      --success: #10b981;
      --warning: #f1c40f;
      --input-bg: #1e293b;
      --input-border: #334155;
      --verified: #38bdf8;
    }

    body.light-mode {
      --dark: #f1f5f9;
      --card-bg: #ffffff;
      --text: #1e293b;
      --input-bg: #f8fafc;
      --input-border: #cbd5e1;
    }

    body { 
      font-family: 'Poppins', sans-serif; 
      background-color: var(--dark); 
      color: var(--text);
      margin: 0; padding: 0;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* Header & Layout */
    header {
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      padding: 40px 15px;
      text-align: center;
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
      position: relative;
    }

    .theme-toggle {
      position: absolute; top: 15px; right: 15px;
      background: rgba(255,255,255,0.2);
      border: none; color: white; padding: 8px 12px;
      border-radius: 12px; cursor: pointer;
    }

    /* Flash Sale */
    .flash-sale-container { max-width: 1000px; margin: 15px auto; padding: 0 15px; }
    .flash-sale-box {
      background: linear-gradient(90deg, #ff416c, #ff4b2b);
      border-radius: 15px; padding: 12px 20px;
      display: flex; justify-content: space-between; align-items: center;
      color: white; font-weight: 700;
    }

    /* Filter & Search */
    .filter-container { display: flex; gap: 10px; padding: 15px; overflow-x: auto; scrollbar-width: none; }
    .btn-filter { background: #1e293b; color: #94a3b8; border: 1px solid var(--input-border); padding: 10px 22px; border-radius: 25px; font-size: 13px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
    .btn-filter.active { background-color: var(--primary) !important; color: var(--dark) !important; }

    .search-container { max-width: 1000px; margin: 15px auto; padding: 0 15px; }
    .search-box input { width: 100%; padding: 12px 15px; border-radius: 15px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text); outline: none; }

    /* Produk Grid */
    #produk { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1000px; margin: 10px auto; padding: 0 15px; }
    .card { background: var(--card-bg); border-radius: 18px; overflow: hidden; border: 1px solid var(--input-border); position: relative; }
    .card-img-container { position: relative; height: 140px; }
    .card img { width: 100%; height: 100%; object-fit: cover; }
    .card-info { padding: 12px; }
    .harga-baru { color: var(--success); font-weight: 700; font-size: 15px; display: block; margin-bottom: 8px; }
    .btn-beli { background: linear-gradient(90deg, var(--secondary), var(--primary)); color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; font-weight: 700; cursor: pointer; }

    /* Sold Out Overlay */
    .sold-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 5; }
    .sold-label { background: var(--danger); color: white; padding: 5px 10px; border-radius: 5px; font-weight: 800; transform: rotate(-15deg); border: 2px solid white; }

    /* --- MODAL STRUK (FIXED) --- */
    #modalStruk { 
      display: none; 
      position: fixed; 
      inset: 0; 
      background: rgba(0,0,0,0.85); 
      z-index: 9999; 
      align-items: center; 
      justify-content: center; 
      backdrop-filter: blur(8px); 
      padding: 20px;
    }
    .struk-box { 
      background: white; 
      color: #333; 
      width: 100%; 
      max-width: 350px; 
      padding: 25px; 
      border-radius: 20px; 
      font-family: monospace; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    /* Drawer & Testimoni */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 1000; }
    .drawer-content { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--card-bg); padding: 30px 20px; z-index: 1001; transition: 0.4s; border-radius: 25px 25px 0 0; }
    .drawer-content.active { bottom: 0; }
    .btn-buka-status { position: fixed; bottom: 25px; right: 25px; background: var(--primary); width: 60px; height: 60px; border-radius: 50%; font-size: 24px; z-index: 999; border: none; cursor: pointer; }

    footer { text-align: center; padding: 40px; font-size: 12px; color: #64748b; }
    @media (min-width: 768px) { #produk { grid-template-columns: repeat(3, 1fr); } }
  </style>
</head>
<body>

<header>
  <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  <h2>🎮 FAZA STORE</h2>
  <p>Akun Sultan, Harga Rakyat.</p>
</header>

<div class="flash-sale-container">
  <div class="flash-sale-box">
    <span>⚡ FLASH SALE</span>
    <span id="timer">00:00:00</span>
  </div>
</div>

<div class="filter-container">
  <button class="btn-filter active" onclick="filterGame(this, 'Semua')">Semua</button>
  <button class="btn-filter" onclick="filterGame(this, 'Mobile Legends')">MLBB</button>
  <button class="btn-filter" onclick="filterGame(this, 'Free Fire')">FF</button>
  <button class="btn-filter" onclick="filterGame(this, 'PUBG Mobile')">PUBG</button>
</div>

<div class="search-container">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Cari akun..." oninput="searchProduk()">
  </div>
</div>

<div id="produk"></div>

<button class="btn-buka-status" onclick="toggleDrawer(true)">🚚</button>

<div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer(false)"></div>
<div class="drawer-content" id="statusDrawer">
  <h3 style="text-align:center">Lacak Pesanan</h3>
  <div style="display:flex; gap:10px">
    <input type="text" id="inputCekStatus" placeholder="ID Invoice (FZ-xxxx)" style="flex:1; padding:12px; border-radius:10px; border:1px solid var(--input-border); background:var(--dark); color:var(--text);">
    <button onclick="cekStatusPesanan()" style="padding:12px; background:var(--primary); border:none; border-radius:10px; font-weight:800">CEK</button>
  </div>
  <div id="hasilStatus" style="margin-top:15px; padding:10px; border:1px solid var(--primary); border-radius:10px; display:none"></div>
  <button onclick="toggleDrawer(false)" style="width:100%; margin-top:20px; background:none; border:none; color:#888;">TUTUP</button>
</div>

<div id="modalStruk">
  <div class="struk-box">
    <h2 style="text-align:center; margin:0;">FAZA STORE</h2>
    <hr style="border:1px dashed #eee; margin:15px 0;">
    <div id="isiStruk"></div>
    <hr style="border:1px dashed #eee; margin:15px 0;">
    <label style="font-size:12px;">Pilih Pembayaran:</label>
    <select id="metodeBayar" style="width:100%; padding:10px; margin-top:5px; border-radius:8px;">
      <option value="DANA">DANA</option>
      <option value="OVO">OVO</option>
      <option value="GoPay">GoPay</option>
    </select>
    <button onclick="kirimInvoiceWA()" style="width:100%; padding:15px; background:#000; color:#fff; border-radius:10px; border:none; font-weight:800; margin-top:15px; cursor:pointer;">BAYAR SEKARANG</button>
    <button onclick="tutupStruk()" style="width:100%; margin-top:10px; background:none; border:none; color:#999; font-size:11px;">Batalkan</button>
  </div>
</div>

<footer>&copy; 2026 Faza Store.</footer>

<script type="module" src="app.js?v=706"></script>

<script>
  window.toggleTheme = function() {
    document.body.classList.toggle('light-mode');
    localStorage.setItem('faza_theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
  };
  if (localStorage.getItem('faza_theme') === 'light') document.body.classList.add('light-mode');

  window.toggleDrawer = function(open) {
    const d = document.getElementById("statusDrawer");
    const o = document.getElementById("drawerOverlay");
    if(open) { o.style.display="block"; setTimeout(()=>d.classList.add("active"),10); }
    else { d.classList.remove("active"); setTimeout(()=>o.style.display="none",400); }
  };

  // Timer Flash Sale
  setInterval(() => {
    let end = localStorage.getItem('faza_flash_sale_end') || (new Date().getTime() + 21600000);
    if(!localStorage.getItem('faza_flash_sale_end')) localStorage.setItem('faza_flash_sale_end', end);
    let dist = end - new Date().getTime();
    let h = Math.floor(dist / 3600000);
    let m = Math.floor((dist % 3600000) / 60000);
    let s = Math.floor((dist % 60000) / 1000);
    document.getElementById('timer').innerHTML = `${h}:${m}:${s}`;
  }, 1000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Gaming Store - Jual Akun Game Murah</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00d2ff;
      --secondary: #3a7bd5;
      --dark: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
    }

    body { 
      font-family: 'Poppins', sans-serif; 
      background-color: var(--dark); 
      color: var(--text);
      margin: 0; 
      padding: 0;
    }

    /* Header Berwarna Gradasi */
    header {
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      padding: 30px 15px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      border-bottom-left-radius: 25px;
      border-bottom-right-radius: 25px;
    }

    header h2 { margin: 0; font-weight: 700; letter-spacing: 1px; }
    header p { margin: 5px 0 0; font-size: 13px; opacity: 0.9; }

    /* Grid Produk */
    #produk { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 15px; 
      max-width: 1000px; 
      margin: 25px auto; 
      padding: 0 15px;
    }
    
    /* Kartu Produk Modern */
    .card { 
      background: var(--card-bg); 
      border-radius: 16px; 
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: var(--primary);
    }
    
    .card-img-container {
      position: relative;
      width: 100%;
      height: 130px;
    }

    .card img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
    }

    /* Badge Label (Opsional) */
    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 210, 255, 0.8);
      padding: 3px 8px;
      font-size: 10px;
      border-radius: 5px;
      font-weight: bold;
    }

    .card-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }

    .card h4 { 
      margin: 0; 
      font-size: 14px; 
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card .deskripsi-teks { 
      font-size: 11px; 
      color: #94a3b8; 
      margin: 8px 0; 
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      height: 30px;
    }

    .card .harga { 
      color: var(--primary); 
      font-weight: 700; 
      font-size: 16px; 
      margin-top: auto;
    }

    /* Tombol Style Gaming */
    .card button { 
      background: linear-gradient(90deg, var(--secondary), var(--primary));
      color: white; 
      border: none; 
      padding: 10px; 
      border-radius: 10px; 
      cursor: pointer; 
      width: 100%;
      font-weight: 600;
      margin-top: 10px;
      font-size: 13px;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }

    .card button:active { opacity: 0.7; }

    /* Footer Sederhana */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 11px;
      color: #64748b;
    }

    /* Responsif untuk Tablet/PC */
    @media (min-width: 768px) {
      #produk { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 1024px) {
      #produk { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <h2>🎮 GAMING STORE</h2>
  <p>Akun Game Sultan, Harga Rakyat.</p>
</header>

<div id="produk">
  </div>

<footer>
  &copy; 2026 Gaming Store Indonesia. All Rights Reserved.
</footer>

<script type="module" src="app.js"></script>

</body>
</html>

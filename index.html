<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Faza Store - Jual Akun Game Murah</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script type="text/javascript">
     (function(){
        emailjs.init("vj_Kj-N52AowtKruT"); 
     })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00d2ff;
      --secondary: #3a7bd5;
      --dark: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --danger: #ef4444;
      --success: #10b981;
      --input-border: #334155;
    }

    body { font-family: 'Poppins', sans-serif; background-color: var(--dark); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }

    header { background: linear-gradient(135deg, var(--secondary), var(--primary)); padding: 40px 15px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
    
    .announcement-bar { background: #1e293b; border-bottom: 1px solid var(--input-border); padding: 10px 0; overflow: hidden; display: flex; align-items: center; }
    .announcement-label { background: var(--danger); color: white; padding: 2px 10px; font-size: 10px; font-weight: 800; border-radius: 4px; margin-left: 15px; }
    
    .filter-container { display: flex; gap: 10px; padding: 15px; overflow-x: auto; scrollbar-width: none; }
    .btn-filter { background: #1e293b; color: #94a3b8; border: 1px solid var(--input-border); padding: 10px 22px; border-radius: 25px; font-size: 13px; font-weight: 600; cursor: pointer; flex-shrink: 0; transition: 0.3s; }
    .btn-filter.active { background-color: var(--primary) !important; color: var(--dark) !important; transform: scale(1.05); }

    #produk { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1000px; margin: 10px auto; padding: 0 15px; animation: fadeIn 0.8s ease-out; }
    
    /* ANIMASI KARTU PRODUK */
    .card { 
      background: var(--card-bg); 
      border-radius: 18px; 
      overflow: hidden; 
      border: 1px solid var(--input-border); 
      position: relative; 
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0, 210, 255, 0.2); border-color: var(--primary); }
    .card img { width: 100%; height: 140px; object-fit: cover; transition: 0.5s; }
    .card:hover img { transform: scale(1.1); }
    
    .card-info { padding: 12px; }
    .badge { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: var(--primary); padding: 4px 8px; font-size: 10px; border-radius: 5px; z-index: 2; }
    
    .harga-baru { color: var(--success); font-weight: 700; font-size: 15px; display: block; margin-bottom: 10px; text-shadow: 0 0 8px rgba(16, 185, 129, 0.2); }
    
    .btn-beli { 
      background: linear-gradient(90deg, var(--secondary), var(--primary)); 
      color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; 
      font-weight: 700; cursor: pointer; transition: 0.3s; 
    }
    .btn-beli:hover { filter: brightness(1.2); box-shadow: 0 0 15px var(--primary); }
    .btn-beli:active { transform: scale(0.95); }

    /* MODAL ANIMASI */
    #modalStruk, #modalDetail, #modalLacak { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(5px); padding: 20px; transition: 0.3s; }
    .struk-box, .detail-box, .lacak-box { 
      animation: modalBounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    @keyframes modalBounce {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .struk-box { background: white; color: #333; width: 100%; max-width: 380px; padding: 20px; border-radius: 15px; max-height: 90vh; overflow-y: auto; }
    .detail-box { background: var(--card-bg); color: var(--text); width: 100%; max-width: 400px; border-radius: 20px; padding: 20px; border: 1px solid var(--input-border); }

    /* LIVE SALES NOTIFIKASI + PULSE */
    .sales-notification {
      position: fixed; bottom: 85px; left: -350px; background: white; color: #333;
      padding: 10px 15px; border-radius: 12px; display: flex; align-items: center; gap: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4); z-index: 998;
      transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      border-left: 5px solid var(--success); max-width: 280px;
    }
    .sales-notification.show { left: 20px; animation: pulse-glow 2s infinite; }
    
    @keyframes pulse-glow {
      0% { box-shadow: 0 10px 25px rgba(0,0,0,0.2), 0 0 0 0 rgba(16, 185, 129, 0.4); }
      70% { box-shadow: 0 10px 25px rgba(0,0,0,0.2), 0 0 0 10px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 10px 25px rgba(0,0,0,0.2), 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    /* FLOATING BUTTON TRUCK */
    .btn-buka-status { 
      position: fixed; bottom: 20px; right: 20px; background: var(--primary); 
      width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; 
      justify-content: center; border: none; box-shadow: 0 4px 15px rgba(0,210,255,0.4); 
      z-index: 100; font-size: 20px; cursor: pointer; 
      animation: float 3s ease-in-out infinite; transition: 0.3s;
    }
    .btn-buka-status:hover { transform: rotate(15deg) scale(1.1); background: white; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    input, select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    .lacak-box { background: var(--card-bg); color: var(--text); width: 100%; max-width: 350px; padding: 20px; border-radius: 15px; border: 1px solid var(--primary); text-align: center; }
  </style>
</head>
<body>

<header>
  <h2 style="margin:0; letter-spacing:1px;">🎮 FAZA STORE</h2>
  <p style="font-size: 13px; opacity: 0.9; margin-top:5px;">Akun Game Murah, Aman & Terpercaya</p>
</header>

<div class="announcement-bar">
  <div class="announcement-label">INFO</div>
  <marquee id="isiPengumuman">Memuat info toko...</marquee>
</div>

<div class="filter-container">
  <button class="btn-filter active" onclick="filterGame(this, 'Semua')">Semua</button>
  <button class="btn-filter" onclick="filterGame(this, 'Mobile Legends')">MLBB</button>
  <button class="btn-filter" onclick="filterGame(this, 'Free Fire')">FF</button>
  <button class="btn-filter" onclick="filterGame(this, 'PUBG Mobile')">PUBG</button>
</div>

<div id="produk"></div>

<div class="testimoni-section" style="max-width: 1000px; margin: 30px auto; padding: 0 15px;">
  <h3 style="font-size: 16px; margin-bottom: 10px; color: var(--primary);">💬 TESTIMONI</h3>
  <div id="list-testimoni" style="display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none;"></div>
</div>

<div id="modalStruk">
  <div class="struk-box">
    <h3 style="text-align:center; margin: 0; color: #333;">STRUK PESANAN</h3>
    <hr style="border: 0.5px dashed #ccc; margin: 15px 0;">
    <div id="isiStruk"></div>
    <hr style="border: 0.5px dashed #ccc; margin: 15px 0;">
    <button onclick="kirimInvoiceWA()" style="width:100%; padding:15px; background:#10b981; color:#fff; border:none; border-radius:10px; font-weight:800; cursor:pointer; font-family: 'Poppins', sans-serif;">KONFIRMASI & BAYAR SEKARANG</button>
    <button onclick="tutupStruk()" style="width:100%; background:none; border:none; color:#888; font-size:11px; margin-top:10px; cursor:pointer;">Kembali</button>
  </div>
</div>

<div id="modalDetail">
  <div class="detail-box">
    <div id="detailGambarWadah"></div>
    <h3 id="detailNama" style="margin: 15px 0 5px 0;"></h3>
    <div id="detailDeskripsi" style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; font-size: 12px; white-space: pre-wrap; margin-bottom: 15px;"></div>
    <div style="display: flex; gap: 10px;">
      <button id="btnNegoWA" style="flex:1; padding:12px; border-radius:10px; border:none; background:#25d366; color:#fff; font-weight:700;">💬 NEGO</button>
      <button id="btnLanjutBeli" style="flex:1; padding:12px; border-radius:10px; border:none; background:var(--primary); color:#fff; font-weight:700;">BELI</button>
    </div>
    <button onclick="tutupDetail()" style="width:100%; background:none; border:none; color:#94a3b8; margin-top:15px;">Tutup</button>
  </div>
</div>

<div id="modalLacak">
  <div class="lacak-box">
    <h3 style="margin-top:0; color: var(--primary);">🚚 Lacak Pesanan</h3>
    <p style="font-size: 12px; color: #94a3b8;">Masukkan ID Invoice untuk cek status</p>
    <input type="text" id="inputCekPesanan" placeholder="Contoh: FZ-1234" style="text-align:center; text-transform:uppercase; margin-bottom:15px;">
    <button onclick="cekStatusPesanan()" style="width:100%; padding:12px; background:var(--primary); color:var(--dark); border:none; border-radius:10px; font-weight:800; cursor:pointer;">CEK STATUS</button>
    <button onclick="document.getElementById('modalLacak').style.display='none'" style="width:100%; background:none; border:none; color:#94a3b8; margin-top:15px; cursor:pointer; font-size:12px;">Tutup</button>
  </div>
</div>

<div id="salesNotif" class="sales-notification">
  <img src="https://cdn-icons-png.flaticon.com/512/5637/5637217.png" alt="Buyer">
  <div class="sales-text">
    <b id="notifUser">Faza Store</b>
    <span id="notifProduk">Baru saja membeli produk</span>
  </div>
</div>

<button class="btn-buka-status" onclick="document.getElementById('modalLacak').style.display='flex'" title="Lacak Pesanan">🚚</button>

<footer style="text-align:center; padding:30px; font-size:11px; color:#64748b;">
  &copy; 2026 Faza Store Indonesia. All Rights Reserved.
</footer>

<script type="module" src="app.js?v=999"></script>

</body>
</html>

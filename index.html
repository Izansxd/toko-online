<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Gaming Store - Jual Akun Game Murah</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00d2ff;
      --secondary: #3a7bd5;
      --dark: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
    }

    body { 
      font-family: 'Poppins', sans-serif; 
      background-color: var(--dark); 
      color: var(--text);
      margin: 0; 
      padding: 0;
    }

    /* Header Berwarna Gradasi */
    header {
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      padding: 40px 15px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
    }

    header h2 { margin: 0; font-weight: 700; letter-spacing: 1px; font-size: 24px; }
    header p { margin: 8px 0 0; font-size: 14px; opacity: 0.9; }

    /* Grid Produk */
    #produk { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 15px; 
      max-width: 1000px; 
      margin: 30px auto; 
      padding: 0 15px;
    }
    
    /* Kartu Produk Modern */
    .card { 
      background: var(--card-bg); 
      border-radius: 18px; 
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: var(--primary);
      box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
    }
    
    .card-img-container {
      position: relative;
      width: 100%;
      height: 140px;
    }

    .card img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
    }

    /* Info di dalam kartu */
    .card-info { 
      padding: 15px; /* Padding ditambah agar teks tidak mepet */
      flex-grow: 1; 
      display: flex; 
      flex-direction: column; 
    }

    .card h4 { 
      margin: 0; 
      font-size: 15px; 
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      /* Membiarkan teks turun ke bawah (Word Wrap) */
      white-space: normal; 
      overflow: visible;
      text-align: left;
    }

    .card .deskripsi-teks { 
      font-size: 11px; 
      color: #94a3b8; 
      margin: 8px 0; 
      line-height: 1.5;
      text-align: left;
      /* Menampilkan deskripsi dengan jelas */
      display: block;
      height: auto; 
      min-height: 30px;
    }

    .card .harga { 
      color: #10b981; /* Warna hijau neon untuk harga */
      font-weight: 700; 
      font-size: 17px; 
      margin: 10px 0;
      text-align: left;
    }

    /* Tombol Style Gaming */
    .card button { 
      background: linear-gradient(90deg, var(--secondary), var(--primary));
      color: white; 
      border: none; 
      padding: 12px; 
      border-radius: 12px; 
      cursor: pointer; 
      width: 100%;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: 0.2s;
    }

    .card button:hover {
      filter: brightness(1.1);
    }

    .card button:active { 
      transform: scale(0.96);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px 20px;
      font-size: 12px;
      color: #64748b;
    }

    /* Responsif untuk Tablet/PC */
    @media (min-width: 768px) {
      #produk { grid-template-columns: repeat(3, 1fr); gap: 20px; }
      .card-img-container { height: 180px; }
    }
    @media (min-width: 1024px) {
      #produk { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <h2>🎮 GAMING STORE</h2>
  <p>Akun Game Sultan, Harga Rakyat.</p>
</header>

<div id="produk">
  </div>

<footer>
  &copy; 2026 Gaming Store Indonesia. All Rights Reserved.
</footer>

<script type="module" src="app.js"></script>

</body>
</html>

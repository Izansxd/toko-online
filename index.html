<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Gaming Store - Jual Akun Game Murah</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00d2ff;
      --secondary: #3a7bd5;
      --dark: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --danger: #ef4444;
      --success: #10b981;
      --warning: #f1c40f;
      --input-bg: #1e293b;
      --input-border: #334155;
    }

    body { 
      font-family: 'Poppins', sans-serif; 
      background-color: var(--dark); 
      color: var(--text);
      margin: 0; 
      padding: 0;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      padding: 40px 15px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
    }

    header h2 { margin: 0; font-weight: 700; letter-spacing: 1px; font-size: 24px; }
    header p { margin: 8px 0 0; font-size: 14px; opacity: 0.9; }

    /* Filter Kategori */
    .filter-container {
      display: flex;
      gap: 10px;
      padding: 25px 15px 5px;
      overflow-x: auto;
      max-width: 1000px;
      margin: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    
    .filter-container::-webkit-scrollbar { display: none; }
    
    .btn-filter {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
      padding: 10px 22px;
      border-radius: 25px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-block;
    }

    .btn-filter.active {
      background-color: var(--primary) !important;
      color: var(--dark) !important;
      border-color: var(--primary) !important;
      box-shadow: 0 0 15px rgba(0, 210, 255, 0.5) !important;
      transform: scale(1.05);
    }

    /* Search Bar Styling */
    .search-container {
      max-width: 1000px;
      margin: 15px auto;
      padding: 0 15px;
    }

    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-box input {
      width: 100%;
      padding: 12px 15px 12px 45px;
      border-radius: 15px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
    }

    .search-box input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
    }

    .search-box i {
      position: absolute;
      left: 15px;
      color: #94a3b8;
      font-size: 16px;
    }

    /* Efek Skeleton Loading */
    .skeleton {
      background: #1e293b;
      background: linear-gradient(110deg, #1e293b 8%, #334155 18%, #1e293b 33%);
      border-radius: 18px;
      background-size: 200% 100%;
      animation: 1.5s shine linear infinite;
    }
    @keyframes shine { to { background-position-x: -200%; } }
    .skeleton-card { height: 280px; width: 100%; }

    /* Grid Produk */
    #produk { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 15px; 
      max-width: 1000px; 
      margin: 10px auto 30px; 
      padding: 0 15px;
      min-height: 300px;
    }
    
    .card { 
      background: var(--card-bg); 
      border-radius: 18px; 
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .card:hover { transform: translateY(-8px); border-color: var(--primary); }
    .card-img-container { position: relative; width: 100%; height: 140px; }
    .card img { width: 100%; height: 100%; object-fit: cover; }

    /* Badge & Promo */
    .badge {
      position: absolute; top: 10px; left: 10px;
      background: rgba(15, 23, 42, 0.8);
      color: var(--primary); padding: 4px 10px;
      font-size: 10px; border-radius: 6px; font-weight: 700;
      text-transform: uppercase; backdrop-filter: blur(4px);
      border: 1px solid var(--primary); z-index: 2;
    }

    .badge-promo {
      position: absolute; top: 10px; right: 10px;
      background: linear-gradient(45deg, #f1c40f, #e67e22);
      color: #000; padding: 4px 10px;
      font-size: 10px; border-radius: 6px; font-weight: 800;
      z-index: 3; box-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .sold-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.7);
      display: flex; align-items: center; justify-content: center; z-index: 5;
    }

    .sold-label {
      background: var(--danger); color: white; padding: 5px 15px;
      font-weight: 800; font-size: 14px; border-radius: 5px;
      transform: rotate(-15deg); border: 2px solid white;
    }

    .card-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
    .card h4 { margin: 0; font-size: 14px; font-weight: 600; line-height: 1.3; text-align: left; }
    .card .deskripsi-teks { font-size: 11px; color: #94a3b8; margin: 8px 0; line-height: 1.5; text-align: left; min-height: 33px; }
    
    /* Harga & Harga Coret */
    .card .harga { color: var(--success); font-weight: 700; font-size: 16px; margin: 5px 0 12px 0; text-align: left; }
    .harga-lama { font-size: 11px; color: #94a3b8; text-decoration: line-through; margin-right: 5px; opacity: 0.7; }

    .card button { 
      background: linear-gradient(90deg, var(--secondary), var(--primary));
      color: white; border: none; padding: 12px; border-radius: 12px; 
      cursor: pointer; width: 100%; font-weight: 700; font-size: 11px;
      text-transform: uppercase; transition: 0.2s;
    }

    .card button:active { transform: scale(0.95); }
    .card button:disabled { background: #475569; cursor: not-allowed; opacity: 0.8; }

    /* --- CSS TESTIMONI --- */
    .testimoni-section {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 15px;
    }
    .testimoni-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
      border-left: 4px solid var(--primary);
      padding-left: 15px;
    }
    .testimoni-header h2 { margin: 0; font-size: 18px; }
    
    #list-testimoni {
      display: flex;
      gap: 15px;
      overflow-x: auto;
      padding: 10px 5px 20px;
      scrollbar-width: none; /* Firefox */
      -ms-overflow-style: none;  /* IE and Edge */
    }
    #list-testimoni::-webkit-scrollbar { display: none; } /* Chrome/Safari */

    .card-testi {
      min-width: 220px;
      max-width: 220px;
      background: var(--card-bg);
      border-radius: 15px;
      padding: 12px;
      border: 1px solid var(--input-border);
      transition: 0.3s;
      flex-shrink: 0;
    }
    .card-testi:hover { border-color: var(--primary); }
    .card-testi img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 10px;
      cursor: zoom-in;
    }
    .card-testi p {
      margin: 10px 0 0;
      font-size: 12px;
      color: #94a3b8;
      text-align: center;
      font-weight: 500;
    }

    footer { text-align: center; padding: 40px 20px; font-size: 12px; color: #64748b; border-top: 1px solid var(--input-border); }

    @media (min-width: 768px) {
      #produk { grid-template-columns: repeat(3, 1fr); gap: 20px; }
      .card-img-container { height: 180px; }
    }
    @media (min-width: 1024px) {
      #produk { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <h2>🎮 GAMING STORE</h2>
  <p>Akun Game Sultan, Harga Rakyat.</p>
</header>

<div class="filter-container">
  <button class="btn-filter active" onclick="filterGame(this, 'Semua')">Semua</button>
  <button class="btn-filter" onclick="filterGame(this, 'Mobile Legends')">MLBB</button>
  <button class="btn-filter" onclick="filterGame(this, 'Free Fire')">FF</button>
  <button class="btn-filter" onclick="filterGame(this, 'PUBG Mobile')">PUBG</button>
  <button class="btn-filter" onclick="filterGame(this, 'Lainnya')">Lainnya</button>
</div>

<div class="search-container">
  <div class="search-box">
    <i>🔍</i>
    <input type="text" id="searchInput" placeholder="Cari akun impianmu..." oninput="searchProduk()" autocomplete="off">
  </div>
</div>

<div id="produk"></div>

<div class="testimoni-section">
  <div class="testimoni-header">
    <h2>💬 TESTIMONI PEMBELI</h2>
  </div>
  <div id="list-testimoni">
    </div>
</div>

<footer>
  &copy; 2026 Gaming Store Indonesia. All Rights Reserved.
</footer>

<script type="module" src="app.js?v=500"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Toko Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 10px; margin: 0; }
    h2 { text-align: center; margin-top: 20px; }
    
    /* Grid Produk */
    #produk { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 15px; 
      max-width: 800px; 
      margin: 20px auto; 
    }
    
    .card { 
      background: white; 
      padding: 10px; 
      border-radius: 12px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
      text-align: center; 
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    
    .card img { 
      width: 100%; 
      height: 120px; 
      object-fit: cover; 
      border-radius: 8px; 
    }

    .card h4 { margin: 10px 0 5px; font-size: 14px; }
    .card p { color: #2ecc71; font-weight: bold; margin: 5px 0; }

    .card button { 
      background: #27ae60; 
      color: white; 
      border: none; 
      padding: 10px; 
      border-radius: 6px; 
      cursor: pointer; 
      font-weight: bold;
    }

    /* Tombol Floating Keranjang */
    .cart-btn { 
      position: fixed; 
      bottom: 20px; 
      right: 20px; 
      background: #f39c12; 
      color: white; 
      border: none; 
      padding: 15px; 
      border-radius: 50%; 
      font-size: 22px; 
      cursor: pointer; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      z-index: 100;
    }

    /* Halaman Keranjang (Slide-in) */
    #cartPage { 
      position: fixed; 
      top: 0; 
      right: 0; 
      width: 85%; 
      max-width: 400px;
      height: 100%; 
      background: white; 
      padding: 20px; 
      box-shadow: -4px 0 15px rgba(0,0,0,0.2); 
      display: none; 
      flex-direction: column;
      z-index: 9999; /* Pastikan di atas segalanya */
      box-sizing: border-box;
    }

    #cartPage h3 { border-bottom: 2px solid #eee; padding-bottom: 10px; }
    #cart { flex-grow: 1; overflow-y: auto; margin-bottom: 20px; }
    
    .btn-tutup { 
      background: #e74c3c; 
      color: white; 
      border: none; 
      padding: 12px; 
      width: 100%; 
      border-radius: 6px; 
      cursor: pointer; 
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>🛍️ Toko Online</h2>

<div id="produk"></div>

<button class="cart-btn" onclick="showCart()">🛒</button>

<div id="cartPage">
  <h3>Keranjang Saya</h3>
  <div id="cart">
    </div>
  <button class="btn-tutup" onclick="hideCart()">Tutup</button>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
